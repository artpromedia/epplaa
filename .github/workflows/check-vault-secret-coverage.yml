name: Vault secret-coverage check

# Fails CI when the api-monolith source tree references a secret-shaped
# env var (matching the patterns in scripts/src/vaultSecretCoverage.config.ts —
# `_KEY$`, `_SECRET$`, `_TOKEN$`, `_PASSWORD$`, `_DSN$`, `_HASH$`,
# `_CREDENTIAL(S)?$`, `_SERVICE_ACCOUNT(_JSON)?$`, plus the explicit
# `SESSION_SECRET`) that is neither:
#   1. declared in infra/helm/api-monolith/values.yaml under
#      `vault.secrets[*].keys[*]` (i.e. wired through Vault via
#      ExternalSecrets in production), NOR
#   2. on the explicit ALLOWLIST in
#      scripts/src/vaultSecretCoverage.config.ts (with a documented
#      reason).
#
# Why this exists:
# The Vault rollout is only "complete" if a CI guard prevents
# regression. Without this check, a future PR that adds a new
# third-party integration could land a `process.env.NEW_PROVIDER_API_KEY`
# reference, ship to production reading from a hand-rolled cluster
# Secret (or a CI env var the deployment platform forgot to plumb
# through), and silently bypass the rotation/audit story Vault exists
# to provide. The check fires on every PR that touches either side of
# the contract — code that uses env vars, or the values file that
# declares Vault wiring — and on the verifier itself + its config.
#
# Fix when this fails:
#  - PREFERRED: add the env var to infra/helm/api-monolith/values.yaml
#    under `vault.secrets[*].keys[*]` (see existing groups —
#    api-monolith-core / api-monolith-providers / api-monolith-internal —
#    and pick the right one for the new secret's rotation cadence), AND
#    seed it via scripts/seed-vault-secrets.sh so a fresh environment
#    boots without that key missing.
#  - LAST RESORT: add the env var to ALLOWLIST in
#    scripts/src/vaultSecretCoverage.config.ts with a documented
#    reason. Only appropriate when the value is genuinely not a
#    credential (a tuning knob whose name accidentally matches the
#    secret-pattern regexes). The verifier prints the reason in its
#    output so an out-of-date allowlist is visible.

on:
  push:
    branches: [main]
    paths:
      - "services/api-monolith/src/**"
      - "infra/helm/api-monolith/values.yaml"
      - "scripts/src/checkVaultSecretCoverage.ts"
      - "scripts/src/checkVaultSecretCoverage.test.ts"
      - "scripts/src/vaultSecretCoverage.config.ts"
      - ".github/workflows/check-vault-secret-coverage.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/api-monolith/src/**"
      - "infra/helm/api-monolith/values.yaml"
      - "scripts/src/checkVaultSecretCoverage.ts"
      - "scripts/src/checkVaultSecretCoverage.test.ts"
      - "scripts/src/vaultSecretCoverage.config.ts"
      - ".github/workflows/check-vault-secret-coverage.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  coverage:
    name: api-monolith → Vault secret-coverage check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run vault secret-coverage check
        run: pnpm --filter @workspace/scripts run check-vault-secret-coverage
