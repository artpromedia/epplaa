name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  sentry-release:
    name: Sentry release tag
    runs-on: ubuntu-latest
    if: ${{ vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
      # Heartbeat the `release-heartbeat` Sentry Cron monitor (#148).
      # The monitor itself is configured in the Sentry UI as an interval
      # monitor ("page if no check-in in 30 days") because release
      # tagging is event-driven (on tag push), not cron-scheduled. The
      # slug is registered in scripts/src/sentryMonitors.config.ts under
      # SENTRY_MONITORS_KNOWN_UI_MANAGED so the reverse-scan drift check
      # recognises it. A run failure (network blip, expired token) is
      # tolerated — the heartbeat is best-effort and the underlying
      # release-tag step above is what actually matters.
      - name: Heartbeat release-heartbeat Sentry Cron monitor
        if: ${{ vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        continue-on-error: true
        run: |
          curl -sSL https://sentry.io/get-cli/ | bash
          sentry-cli monitors run \
            --environment production \
            release-heartbeat \
            -- /bin/true

  sentry-monitors-sync:
    # Push the Sentry Cron monitor configuration declared in
    # scripts/src/sentryMonitors.config.ts to Sentry's Monitors API
    # (task #77). Idempotent: re-runs on every release, only matters
    # when something actually changed. Without this step, a merged-but-
    # unsynced cron change would still leave Sentry's monitor on the
    # old schedule until an operator hand-edited the UI — exactly the
    # drift this task closes.
    name: Sync Sentry Cron monitor configuration
    runs-on: ubuntu-latest
    if: ${{ vars.SENTRY_ORG != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Upsert monitors via Sentry API
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: pnpm --filter @workspace/scripts run sync-sentry-monitors

  sentry-issue-alerts-sync:
    # Push the production-secret issue-alert configuration declared in
    # scripts/src/productionSecretAlerts.config.ts to Sentry's project
    # rules API (task #96). Sibling of `sentry-monitors-sync` above
    # and uses the same env-var contract — but rule sync is project-
    # scoped, so we additionally gate on `vars.SENTRY_PROJECT != ''`.
    # The companion `check-sentry-issue-alert-credentials` step in
    # `ci.yml` fails the PR build when the declared intent ("we
    # manage these alert rules in code") isn't backed by the
    # credentials the sync needs, so this job never silently skips
    # without a CI-time signal first.
    name: Sync Sentry production-secret issue alert rules
    runs-on: ubuntu-latest
    needs: sentry-monitors-sync
    if: ${{ vars.SENTRY_ORG != '' && vars.SENTRY_PROJECT != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Upsert production-secret issue alerts via Sentry API
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          # Public runbook URL is rendered into each rule's notify
          # action so on-call sees a deep link in the page body.
          # `vars.PRODUCTION_SECRETS_RUNBOOK_URL` is optional — when
          # unset the syncer falls back to the in-repo path, which
          # still tells operators where to look.
          RUNBOOK_URL: ${{ vars.PRODUCTION_SECRETS_RUNBOOK_URL }}
        run: pnpm --filter @workspace/scripts run sync-sentry-issue-alerts

  # Post-deploy configuration gate (Task #100, building on #89).
  #
  # Calls the reusable `check-production-hostname-pattern.yml` workflow
  # as the final job in the release pipeline so that a release whose
  # production deploy is missing `PRODUCTION_HOSTNAME_PATTERN` fails
  # the GitHub release run synchronously, instead of waiting up to ~15
  # minutes for the cron tick to page on-call. The reusable workflow's
  # own `if: vars.HOSTNAME_PATTERN_PROBE_ENABLED == '1'` guard means
  # this job no-ops cleanly until an operator opts in by setting that
  # repo variable; the cron + Sentry Cron monitor configuration
  # documented in `docs/runbooks/staging-only-endpoints.md` (post-
  # deploy verifier section) lists every required var/secret.
  #
  # `needs: sentry-release` keeps the gate AFTER release tagging so the
  # probe runs against the freshly-deployed image rather than racing it.
  # `if: always()` ensures the gate still runs when `sentry-release` is
  # skipped (Sentry vars unset) or fails — the configuration check is
  # independent of Sentry release tagging and must not be silently
  # bypassed by an unrelated upstream failure. A non-zero exit from the
  # probe fails this job, which fails the overall release run and fires
  # the GitHub failed-workflow notification AND (when the DSN is
  # configured) a Sentry fatal-level page via the reusable workflow's
  # in-loop forwarder.
  #
  # `secrets: inherit` is required because the reusable workflow reads
  # `secrets.HOSTNAME_PATTERN_SENTRY_DSN` directly and does not declare
  # it as a `secrets:` input. Repo `vars.*` are inherited automatically
  # by called workflows, so the `HOSTNAME_PATTERN_PROBE_ENABLED`,
  # `READYZ_URL`, `SENTRY_ORG`, and `SENTRY_PROJECT` vars are visible
  # to the called job without explicit pass-through.
  post-deploy-config-check:
    name: Post-deploy config check (production hostname pattern)
    needs: sentry-release
    if: always()
    uses: ./.github/workflows/check-production-hostname-pattern.yml
    secrets: inherit

  # Generalised post-deploy configuration gate (Task #103, building on
  # Task #101). The hostname-only check above is a strict subset of
  # this generalised check — the readyz config block now surfaces a
  # tri-state status for ALL ten high-risk operator-set boot-time
  # settings (`PRODUCTION_HOSTNAME_PATTERN`, the rehearsal injector
  # kill switch, the stub-fulfillment kill switch, the rate-limit
  # store, the Sentry DSN, `MFA_ENCRYPTION_KEY`, `CLERK_SECRET_KEY`,
  # `TERMII_API_KEY`, `MODERATION_PROVIDER`, and `SANCTIONS_PROVIDER`).
  # Wiring it as a sibling job (rather than replacing the hostname-
  # only gate) keeps the rollback surface minimal during the runbook-
  # documented one-week soak before the legacy gate is retired: if the
  # generalised check has a false-positive bug, on-call still has the
  # narrower hostname-only check protecting that one field, and the
  # legacy job's history shows whether the regression is in the new
  # check or in the surface itself.
  #
  # Both jobs depend on `sentry-release` and use `if: always()` for
  # the same reasons documented on the hostname-only job above. The
  # called workflow is independently gated by
  # `vars.READYZ_CONFIG_PROBE_ENABLED == '1'` so this job no-ops
  # cleanly until an operator opts in via repo variables (see
  # `docs/runbooks/staging-only-endpoints.md` for the full required-
  # vars/secrets list and the retirement plan for the legacy job).
  post-deploy-readyz-config-check:
    name: Post-deploy config check (full readyz config block)
    needs: sentry-release
    if: always()
    uses: ./.github/workflows/check-readyz-config.yml
    secrets: inherit

  # /readyz dependency-probe wire-shape probe (Task #122).
  #
  # Sibling of the two post-deploy config-check jobs above: polls
  # the deployed /readyz URL (vars.READYZ_URL) and asserts the
  # per-probe wire-shape fields (`checks.<name>` / `failures.<name>` /
  # `config.dependencyProbes.<name>`) for clerk, paystack, and
  # flutterwave match the contract documented in
  # `docs/runbooks/readyz-dependency-probes.md`. Where the config-
  # block gates assert operator-set boot-time values, this gate
  # asserts the per-probe response shape itself — a route-side
  # refactor that renamed a checks value, dropped a config field,
  # or stopped emitting the `http_probe_timeout_after_<n>ms` marker
  # would slip past unit tests (which stub fetch via `vi.stubGlobal`)
  # and only show up the next time a probe was enabled in production.
  #
  # `needs: sentry-release` matches the sibling post-deploy gates
  # so all three run after release tagging. `if: always()` ensures
  # the gate still runs when `sentry-release` is skipped (Sentry
  # vars unset) or fails — the wire-shape check is independent of
  # Sentry release tagging and must not be silently bypassed by an
  # unrelated upstream failure. `secrets: inherit` mirrors the
  # sibling config-gate jobs so the called workflow can read
  # `secrets.READYZ_DEPENDENCY_PROBE_WIRE_SHAPE_SENTRY_DSN` for
  # Sentry forwarding + cron-monitor heartbeat. The full rationale
  # and the "When to re-run" triggers live in the called workflow's
  # header comment and the runbook section above.
  post-deploy-readyz-dependency-probe-wire-shape-check:
    name: Post-deploy wire-shape check (/readyz dependency probes)
    needs: sentry-release
    if: always()
    uses: ./.github/workflows/check-readyz-dependency-probe-wire-shape.yml
    secrets: inherit
