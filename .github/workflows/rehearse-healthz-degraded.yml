name: Rehearse stuck-degraded page (staging, weekly)

# Weekly end-to-end rehearsal of the `checkHealthzDegraded` -> Sentry
# pager chain against staging. Catches silent regressions in the alert
# wiring *before* they hide a real outage.
#
# Why this workflow exists (see docs/runbooks/rate-limit-store.md
# Step 5 — "Rehearsal"): the per-minute probe workflow
# `check-healthz-degraded.yml` only fires the pager when staging or
# prod is *actually* degraded. That means:
#
#   - If Sentry's "new fatal-level issue" rule gets disabled or its
#     query is mistuned (e.g. someone renames the
#     `alert:rate_limit_store_stuck_degraded` tag),
#   - or the per-subsystem fingerprint stops collapsing iterations
#     into one issue (and on-call would get N pages per outage
#     instead of one),
#   - or the probe's per-subsystem JSON shape regresses so the
#     offending subsystem name is missing from the page body,
#   - or the probe's JSON line stops surviving Sentry's PII scrubber,
#   - or the GitHub failure-notification channel rotates,
#   - or the on-call routing for one subsystem (e.g. `db`) silently
#     drifts away from the other (e.g. `rateLimitStore`),
#
# we wouldn't notice until the first real outage — at which point the
# page either doesn't fire or fires N times. This workflow injects a
# synthetic stuck-degraded streak into staging via the guarded
# `/api/_rehearsal/inject-stuck-degraded` endpoint, runs the probe,
# asserts the expected Sentry event lands, and then clears the streak
# so staging is healthy again.
#
# It rehearses both subsystems exposed by `/healthz`'s `subsystems`
# map — `rateLimitStore` AND `db` — as separate matrix entries with
# their own per-subsystem Sentry fingerprints (so a regression in one
# subsystem's pager wiring can't be masked by the other). The matrix
# entries are serialised (`max-parallel: 1`) so each one has a clean
# slate when its inject -> probe -> verify -> clear cycle runs — if
# they overlapped, the probe's "worst offender" pick could
# non-deterministically attribute the page to the other subsystem and
# the per-entry assertion would flake.
#
# Cadence: weekly is enough — the alerting chain doesn't churn fast
# enough to need per-day rehearsals, and a weekly cadence keeps the
# rehearsal noise (one Sentry issue per subsystem per week in the
# rehearsal project) negligible.
#
# Required repo configuration (Settings -> Secrets and variables ->
# Actions). The workflow degrades safely when these are missing — see
# the `if:` gate and the `Verify config` step.
#
#   vars.HEALTHZ_REHEARSAL_ENABLED              — must equal "1" to opt in.
#                                                 Acts as a kill switch — set
#                                                 to anything else to silence
#                                                 the workflow without
#                                                 removing the file.
#   vars.HEALTHZ_REHEARSAL_STAGING_BASE_URL     — base URL of the staging
#                                                 api (e.g.
#                                                 https://api.staging.epplaa.com).
#                                                 The workflow appends
#                                                 /api/_rehearsal/* and
#                                                 /api/healthz to it.
#   vars.HEALTHZ_REHEARSAL_THRESHOLD_MS         — threshold the probe is
#                                                 invoked with. Defaults to
#                                                 60000 (1 min) — the
#                                                 rehearsal injects a 10-min
#                                                 streak so this comfortably
#                                                 trips a page.
#   vars.HEALTHZ_REHEARSAL_INJECT_DURATION_MS   — how far in the past to
#                                                 stamp firstFailureAt.
#                                                 Defaults to 600000 (10 min).
#   vars.HEALTHZ_REHEARSAL_SENTRY_PROJECT       — Sentry project SLUG used
#                                                 to query the events API
#                                                 for verification (NOT the
#                                                 numeric ID). Should be a
#                                                 dedicated `alerts-rehearsal`
#                                                 project so production
#                                                 alerts stay clean.
#   vars.HEALTHZ_REHEARSAL_SENTRY_ORG           — Sentry org SLUG.
#
#   secrets.HEALTHZ_REHEARSAL_TOKEN             — bearer token forwarded as
#                                                 X-Rehearsal-Token. Must
#                                                 match the staging api
#                                                 server's
#                                                 HEALTHZ_REHEARSAL_TOKEN
#                                                 env var.
#   secrets.HEALTHZ_REHEARSAL_SENTRY_DSN        — DSN that sentry-cli posts
#                                                 the rehearsal event to.
#                                                 Must point at the
#                                                 dedicated alerts-rehearsal
#                                                 project to avoid polluting
#                                                 production alerts.
#   secrets.HEALTHZ_REHEARSAL_SENTRY_AUTH_TOKEN — Sentry auth token with
#                                                 `event:read` scope on the
#                                                 rehearsal project. Used to
#                                                 poll the events API for
#                                                 the verification step.
#
# Optional chat heads-up (Slack incoming webhook or Teams workflow webhook).
# When unset, the notify steps no-op silently — same degrade-safe pattern as
# the Sentry config above. When set, the workflow posts a "starting" message
# before injecting the synthetic streak so anyone tailing staging /healthz or
# the Sentry org-level dashboards at 04:17 UTC Sunday can recognise the blip
# as the rehearsal (not a real outage), and a "passed/failed" message after
# cleanup so a silent end-to-end break in the chat path also becomes visible.
#
#   secrets.HEALTHZ_REHEARSAL_NOTIFY_WEBHOOK    — Incoming webhook URL. The
#                                                 workflow POSTs `{"text": ...}`
#                                                 which works for both Slack
#                                                 incoming webhooks and Teams
#                                                 Workflows webhook triggers.
#                                                 Stored as a secret because
#                                                 the URL is itself the
#                                                 credential.
#   vars.HEALTHZ_REHEARSAL_NOTIFY_CHANNEL       — Cosmetic channel label
#                                                 (e.g. `#ops`) included in
#                                                 the message body so the
#                                                 destination is obvious in
#                                                 the workflow logs and the
#                                                 chat post itself. Defaults
#                                                 to `#ops`. The actual
#                                                 routing is determined by
#                                                 the webhook URL.

on:
  schedule:
    # Sundays 04:17 UTC — off-peak so the rehearsal can't be confused
    # with a real outage during business hours, and odd-minute-offset
    # so it doesn't pile up with the per-minute probe at the top of
    # the hour.
    - cron: "17 4 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # At most one rehearsal at a time, and never overlap with another
  # ad-hoc workflow_dispatch run — the inject endpoint mutates a
  # shared in-process watcher and a parallel run would race on the
  # cleanup phase.
  group: rehearse-healthz-degraded
  cancel-in-progress: false

jobs:
  rehearse:
    name: "Rehearse ${{ matrix.subsystem }}: inject -> probe -> verify Sentry -> clear"
    if: ${{ vars.HEALTHZ_REHEARSAL_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      # Don't let one subsystem's failure short-circuit the other —
      # if the `db` rehearsal regresses we still want a fresh signal
      # for `rateLimitStore` (and vice versa) so on-call knows
      # exactly which pager chain broke.
      fail-fast: false
      # Serialise the matrix entries: each one toggles a subsystem on
      # the *same* staging api-server's in-process watchers. If both
      # ran concurrently, after both had injected the probe would see
      # two stuck subsystems at once and the per-entry assertion that
      # the probe's "worst offender" subsystem matches THIS entry's
      # subsystem would flake non-deterministically (the probe ranks
      # by duration then name to pick the offender). Serialising keeps
      # each entry's inject -> probe -> clear cycle on a clean slate.
      max-parallel: 1
      matrix:
        include:
          - subsystem: rateLimitStore
            # Sentry tag VALUE the production probe uses for the
            # rate-limit pager. Mirrored here so a Sentry inbound
            # filter or PII scrubber that drops these tags would be
            # caught by this rehearsal instead of by a real outage.
            sentry_subsystem_tag: rate_limit
            sentry_alert_tag: rate_limit_store_stuck_degraded
            # Per-subsystem fingerprint so the 5 rehearsal events
            # collapse into 1 issue per subsystem per run. Renaming
            # this would re-fragment the production grouping too —
            # the assertion below catches that.
            sentry_fingerprint: rate_limit_store_stuck_degraded_rehearsal
          - subsystem: db
            # Sentry tag values for the db pager. Distinct from the
            # rate-limit values above so on-call routing rules can
            # fan out per subsystem (e.g. db pages -> db on-call,
            # rate-limit pages -> api on-call) and we'd notice if one
            # got silently merged into the other.
            sentry_subsystem_tag: db
            sentry_alert_tag: db_stuck_degraded
            # Distinct fingerprint per subsystem so a `db` outage
            # never collapses with a concurrent `rateLimitStore`
            # outage in Sentry — on-call needs to see both.
            sentry_fingerprint: stuck_degraded_rehearsal_db

    env:
      STAGING_BASE_URL: ${{ vars.HEALTHZ_REHEARSAL_STAGING_BASE_URL }}
      HEALTHZ_REHEARSAL_TOKEN: ${{ secrets.HEALTHZ_REHEARSAL_TOKEN }}
      HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS: ${{ vars.HEALTHZ_REHEARSAL_THRESHOLD_MS || '60000' }}
      HEALTHZ_PROBE_TIMEOUT_MS: '5000'
      INJECT_DURATION_MS: ${{ vars.HEALTHZ_REHEARSAL_INJECT_DURATION_MS || '600000' }}
      SENTRY_DSN: ${{ secrets.HEALTHZ_REHEARSAL_SENTRY_DSN }}
      SENTRY_ORG: ${{ vars.HEALTHZ_REHEARSAL_SENTRY_ORG }}
      SENTRY_PROJECT: ${{ vars.HEALTHZ_REHEARSAL_SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.HEALTHZ_REHEARSAL_SENTRY_AUTH_TOKEN }}
      # Per-matrix-entry values so the inject/probe/forward/verify
      # steps stay subsystem-agnostic and the per-subsystem detail
      # lives in the matrix definition above.
      SUBSYSTEM: ${{ matrix.subsystem }}
      SENTRY_SUBSYSTEM_TAG: ${{ matrix.sentry_subsystem_tag }}
      SENTRY_ALERT_TAG: ${{ matrix.sentry_alert_tag }}
      SENTRY_FINGERPRINT: ${{ matrix.sentry_fingerprint }}
      # A unique tag value per run AND per subsystem so the
      # verification step can poll Sentry for events from THIS
      # entry only — without the subsystem suffix the two matrix
      # entries' verify queries would cross-contaminate (and the
      # "5 events -> 1 issue" assertion would see 10 events / 2
      # issues and fail spuriously). The subsystem suffix is also
      # surfaced in the chat heads-up below so on-call can tell
      # which matrix entry started/finished.
      RUN_ID_TAG: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.subsystem }}
      # Optional chat heads-up. NOTIFY_WEBHOOK is empty when the
      # secret is unset, in which case the notify steps no-op.
      NOTIFY_WEBHOOK: ${{ secrets.HEALTHZ_REHEARSAL_NOTIFY_WEBHOOK }}
      NOTIFY_CHANNEL: ${{ vars.HEALTHZ_REHEARSAL_NOTIFY_CHANNEL || '#ops' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install sentry-cli
        run: curl -sL https://sentry.io/get-cli/ | INSTALL_DIR=/usr/local/bin sh

      - name: Verify required config is present
        run: |
          set -e
          missing=()
          [ -n "$STAGING_BASE_URL" ] || missing+=("vars.HEALTHZ_REHEARSAL_STAGING_BASE_URL")
          [ -n "$HEALTHZ_REHEARSAL_TOKEN" ] || missing+=("secrets.HEALTHZ_REHEARSAL_TOKEN")
          [ -n "$SENTRY_DSN" ] || missing+=("secrets.HEALTHZ_REHEARSAL_SENTRY_DSN")
          [ -n "$SENTRY_AUTH_TOKEN" ] || missing+=("secrets.HEALTHZ_REHEARSAL_SENTRY_AUTH_TOKEN")
          [ -n "$SENTRY_ORG" ] || missing+=("vars.HEALTHZ_REHEARSAL_SENTRY_ORG")
          [ -n "$SENTRY_PROJECT" ] || missing+=("vars.HEALTHZ_REHEARSAL_SENTRY_PROJECT")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::missing required config: ${missing[*]}"
            exit 1
          fi
          echo "ok"

      - name: Notify chat that rehearsal is starting
        id: notify_start
        # No-op when the webhook isn't configured — same degrade-safe
        # pattern as the rest of the rehearsal config. `continue-on-
        # error` ensures a broken chat path can't block the rehearsal
        # itself; the warning is surfaced both in the step log and in
        # the run summary so the chat-path break stays visible.
        if: ${{ env.NOTIFY_WEBHOOK != '' }}
        continue-on-error: true
        run: |
          set +e
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          text=$(printf '%s\n%s\n%s' \
            ":satellite_antenna: *Healthz stuck-degraded rehearsal STARTING* on staging (${NOTIFY_CHANNEL}, run \`${RUN_ID_TAG}\`)." \
            "If you see a synthetic stuck-degraded blip on staging \`/healthz\` or fatal-level events in the \`alerts-rehearsal\` Sentry project in the next ~5 minutes, that's expected — this is the weekly rehearsal, not a real outage." \
            "Workflow run: ${run_url}")
          payload=$(jq -nc --arg text "$text" '{text: $text}')
          code=$(curl -sS -o /tmp/notify_resp -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$NOTIFY_WEBHOOK" || echo "000")
          body=$(cat /tmp/notify_resp 2>/dev/null || true)
          if [ "$code" != "200" ] && [ "$code" != "204" ]; then
            echo "::warning::notify webhook returned HTTP $code (body: $body) — proceeding with rehearsal anyway, but the chat-path heads-up did not reach ${NOTIFY_CHANNEL}"
            exit 1
          fi
          echo "starting heads-up posted to ${NOTIFY_CHANNEL} (HTTP $code)"

      - name: Inject synthetic stuck-degraded streak into staging
        id: inject
        run: |
          set -e
          # Stamp firstFailureAt INJECT_DURATION_MS ms in the past so
          # the streak is comfortably older than the threshold the
          # probe will be invoked with. The api server validates that
          # firstFailureAt is in the past so this can't silently no-op.
          now_ms=$(($(date +%s%N) / 1000000))
          first_failure_at=$((now_ms - INJECT_DURATION_MS))
          echo "first_failure_at=$first_failure_at" >> "$GITHUB_OUTPUT"
          resp=$(curl -sS -w '\n%{http_code}' \
            -X POST "$STAGING_BASE_URL/api/_rehearsal/inject-stuck-degraded" \
            -H "Content-Type: application/json" \
            -H "X-Rehearsal-Token: $HEALTHZ_REHEARSAL_TOKEN" \
            --data "{\"subsystem\":\"$SUBSYSTEM\",\"firstFailureAt\":$first_failure_at,\"failureCount\":3}")
          body=$(printf '%s' "$resp" | head -n -1)
          code=$(printf '%s' "$resp" | tail -n 1)
          echo "inject response (HTTP $code): $body"
          if [ "$code" != "200" ]; then
            echo "::error::inject endpoint returned HTTP $code"
            exit 1
          fi
          # Sanity: assert the server confirms a durationMs > threshold
          # — guards against clock-skew between the runner and staging
          # silently producing a too-small synthetic streak.
          duration_ms=$(printf '%s' "$body" | jq -r '.durationMs // 0')
          if [ "$duration_ms" -le "$HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS" ]; then
            echo "::error::injected durationMs=$duration_ms is not > threshold $HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS — clock skew?"
            exit 1
          fi

      - name: Run probe and assert it pages (exit code 2)
        id: probe
        env:
          HEALTHZ_URL: ${{ vars.HEALTHZ_REHEARSAL_STAGING_BASE_URL }}/api/healthz
        run: |
          set +e
          out=$(pnpm --silent --filter @workspace/api-server run check-healthz-degraded 2>&1)
          code=$?
          set -e
          printf '%s\n' "$out"
          # Persist the probe JSON so subsequent steps can include it
          # in the Sentry payload AND in GITHUB_STEP_SUMMARY.
          printf '%s' "$out" > probe_output.txt
          if [ "$code" -ne 2 ]; then
            echo "::error::probe exited $code, expected 2 (page). The synthetic streak isn't reaching the probe — has the inject endpoint, /healthz schema, or threshold drifted?"
            exit 1
          fi
          # Assert the probe JSON has the expected shape so a regression
          # in the response schema (or in the probe itself) is caught
          # here, not when on-call gets a malformed page body.
          subsystem=$(printf '%s' "$out" | jq -r '.subsystem // empty')
          outcome=$(printf '%s' "$out" | jq -r '.outcome // empty')
          duration_ms=$(printf '%s' "$out" | jq -r '.durationMs // 0')
          # Assert the probe attributed the page to THIS matrix
          # entry's subsystem. If it picked a different one, either
          # (a) the matrix entries were not actually serialised so the
          # other entry's inject is still in effect, or (b) the
          # probe's per-subsystem JSON shape regressed and the
          # `subsystem` field is no longer the offender's name.
          if [ "$outcome" != "page" ] || [ "$subsystem" != "$SUBSYSTEM" ]; then
            echo "::error::probe JSON unexpected: outcome=$outcome subsystem=$subsystem (expected outcome=page subsystem=$SUBSYSTEM)"
            exit 1
          fi
          if [ "$duration_ms" -le "$HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS" ]; then
            echo "::error::probe reports durationMs=$duration_ms not > threshold $HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS"
            exit 1
          fi
          echo "probe paged correctly (subsystem=$subsystem durationMs=$duration_ms)"

      - name: Forward 5 page events to the rehearsal Sentry project
        id: forward
        run: |
          set -e
          out=$(cat probe_output.txt)
          # Five events with the SAME fingerprint so we can verify
          # downstream that they collapse into a single Sentry issue
          # (mirrors the per-minute probe's 5-iteration loop).
          for i in 1 2 3 4 5; do
            sentry-cli send-event \
              --message "${SENTRY_ALERT_TAG} REHEARSAL (iteration $i)" \
              --level fatal \
              --tag "subsystem:${SENTRY_SUBSYSTEM_TAG}" \
              --tag "alert:${SENTRY_ALERT_TAG}" \
              --tag "rehearsal:1" \
              --tag "rehearsal_subsystem:${SUBSYSTEM}" \
              --tag "rehearsal_run_id:$RUN_ID_TAG" \
              --tag "scheduler:github-actions" \
              --tag "workflow:rehearse-healthz-degraded" \
              --fingerprint "${SENTRY_FINGERPRINT}" \
              --extra "probe_output=$out" \
              --extra "iteration=$i" \
              --extra "rehearsal_run=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              || { echo "::error::sentry-cli send-event failed on iteration $i"; exit 1; }
            sleep 2
          done

      - name: Verify Sentry ingested the rehearsal events with correct shape
        id: verify
        run: |
          set -e
          # Sentry ingestion is async — events typically appear in the
          # events API within ~30s. Poll for up to ~3 minutes.
          deadline=$(( $(date +%s) + 180 ))
          base="https://sentry.io/api/0/organizations/${SENTRY_ORG}/events/"
          # Query for events tagged with this run's unique id, in
          # the rehearsal project, level=fatal, within the last 10m.
          # We use the discover events API so we can filter by tag and
          # see how many distinct events landed for the same fingerprint.
          # Encode `+` so spaces in the query don't break the URL.
          query="rehearsal_run_id:${RUN_ID_TAG}+level:fatal"
          url="${base}?project=${SENTRY_PROJECT}&statsPeriod=10m&query=${query}&field=id&field=timestamp&field=tags%5Balert%5D&field=tags%5Brehearsal%5D&field=tags%5Bsubsystem%5D&per_page=10"
          while :; do
            resp=$(curl -sS -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
              -H "Accept: application/json" \
              "$url" || true)
            count=$(printf '%s' "$resp" | jq -r '.data | length // 0' 2>/dev/null || echo 0)
            if [ "${count:-0}" -ge 1 ]; then
              echo "Sentry returned $count event(s) for rehearsal_run_id=$RUN_ID_TAG"
              # Assert the expected tags survived ingestion / PII scrub.
              alert_tag=$(printf '%s' "$resp" | jq -r '.data[0]["tags[alert]"] // empty')
              subsystem_tag=$(printf '%s' "$resp" | jq -r '.data[0]["tags[subsystem]"] // empty')
              rehearsal_tag=$(printf '%s' "$resp" | jq -r '.data[0]["tags[rehearsal]"] // empty')
              # Per-matrix-entry expected values — the production
              # pager rules key off (alert, subsystem) and on-call
              # routing fans out per subsystem, so we assert the
              # values for THIS entry instead of a hardcoded pair.
              if [ "$alert_tag" != "$SENTRY_ALERT_TAG" ] \
                 || [ "$subsystem_tag" != "$SENTRY_SUBSYSTEM_TAG" ] \
                 || [ "$rehearsal_tag" != "1" ]; then
                echo "::error::ingested event tags mismatched: alert=$alert_tag subsystem=$subsystem_tag rehearsal=$rehearsal_tag (expected alert=$SENTRY_ALERT_TAG subsystem=$SENTRY_SUBSYSTEM_TAG rehearsal=1)"
                exit 1
              fi
              # Assert fingerprint dedup — we sent 5 events with the
              # same fingerprint; the rehearsal project should report
              # them rolled up onto a single issue. Use the issues API
              # filtered by the same run-id tag.
              issues_url="https://sentry.io/api/0/projects/${SENTRY_ORG}/${SENTRY_PROJECT}/issues/?query=rehearsal_run_id:${RUN_ID_TAG}&statsPeriod=10m"
              issues=$(curl -sS -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
                -H "Accept: application/json" "$issues_url" || true)
              issue_count=$(printf '%s' "$issues" | jq -r 'length // 0' 2>/dev/null || echo 0)
              if [ "${issue_count:-0}" -ne 1 ]; then
                echo "::error::expected the 5 rehearsal events to collapse into 1 issue (fingerprint dedup), saw $issue_count"
                exit 1
              fi
              echo "fingerprint dedup OK — 5 events -> 1 issue"

              # Also assert the probe_output `extra` field survived
              # ingestion. The on-call page body is composed FROM that
              # extra (the probe JSON line), so if Sentry's PII
              # scrubber, an inbound filter, or a project rule starts
              # stripping `extra.probe_output`, on-call would receive
              # a body with no actionable detail — silently. The list
              # endpoint above only exposes summary tags, so we have
              # to fetch one full event to inspect its `entries`/
              # `context` payload.
              event_id=$(printf '%s' "$resp" | jq -r '.data[0].id // empty')
              issue_id=$(printf '%s' "$issues" | jq -r '.[0].id // empty')
              issue_short=$(printf '%s' "$issues" | jq -r '.[0].shortId // empty')
              if [ -z "$event_id" ]; then
                echo "::error::events API returned no event id, can't fetch the full event for extra-payload assertion"
                exit 1
              fi
              event_url="https://sentry.io/api/0/projects/${SENTRY_ORG}/${SENTRY_PROJECT}/events/${event_id}/"
              event_full=$(curl -sS -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
                -H "Accept: application/json" "$event_url" || true)
              # Sentry stores `--extra` payloads under the `additional
              # data` context, which the events API surfaces as
              # `context.<key>` OR as a context entry of type
              # `additional_data` depending on SDK version. Check both.
              probe_extra=$(printf '%s' "$event_full" | jq -r '
                (.context.probe_output // empty)
                // (.contexts["Additional Data"].probe_output // empty)
                // (.contexts.additional_data.probe_output // empty)
              ')
              if [ -z "$probe_extra" ] || [ "$probe_extra" = "null" ]; then
                echo "::error::event ${event_id} has no probe_output extra — Sentry PII scrubber or a project rule is stripping it. The on-call page body for production would be missing the offending subsystem / streak duration / threshold detail."
                printf '%s\n' "$event_full" | jq -r '. | {context, contexts}' || true
                exit 1
              fi
              # Sanity: the extra must contain the probe's JSON shape
              # (subsystem + outcome) so we'd notice if a serialiser
              # change started storing a stringified `[object Object]`
              # instead of the JSON line.
              if ! printf '%s' "$probe_extra" | grep -q '"subsystem"' \
                 || ! printf '%s' "$probe_extra" | grep -q '"outcome"'; then
                echo "::error::probe_output extra is present but doesn't contain the expected probe JSON shape: $probe_extra"
                exit 1
              fi
              echo "probe_output extra survived ingestion OK"
              # Surface the matched IDs in the run summary so on-call
              # can jump straight to the rehearsed Sentry event/issue
              # when triaging a failure.
              {
                echo "matched_event_id=$event_id"
                echo "matched_issue_id=$issue_id"
                echo "matched_issue_short=$issue_short"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "::error::Sentry events API returned 0 events for rehearsal_run_id=$RUN_ID_TAG within 3 minutes"
              echo "last response body: $resp"
              exit 1
            fi
            echo "no events yet (count=${count:-0}), sleeping 15s..."
            sleep 15
          done

      - name: Clear synthetic streak (always run)
        if: ${{ always() }}
        run: |
          set -e
          # Even if any earlier step failed we MUST clear the synthetic
          # streak — leaving staging in a forever-degraded state would
          # cause the per-minute probe workflow to start paging on-call
          # for real until someone notices and resets manually.
          resp=$(curl -sS -w '\n%{http_code}' \
            -X POST "$STAGING_BASE_URL/api/_rehearsal/clear-stuck-degraded" \
            -H "Content-Type: application/json" \
            -H "X-Rehearsal-Token: $HEALTHZ_REHEARSAL_TOKEN" \
            --data "{\"subsystem\":\"$SUBSYSTEM\"}")
          body=$(printf '%s' "$resp" | head -n -1)
          code=$(printf '%s' "$resp" | tail -n 1)
          echo "clear response (HTTP $code): $body"
          if [ "$code" != "200" ]; then
            # A failure to clear is itself page-worthy — surface
            # loudly and fail the job so the cleanup never goes silent.
            echo "::error::clear endpoint returned HTTP $code for subsystem=$SUBSYSTEM — staging may be left in a synthetic degraded state, manually POST clear-stuck-degraded with that subsystem"
            exit 1
          fi

      - name: Notify chat with rehearsal result
        id: notify_result
        # Mirrors `Notify chat that rehearsal is starting` — same
        # degrade-safe gating, same continue-on-error so a broken chat
        # path doesn't bury the actual rehearsal outcome. Runs on
        # `always()` so on-call gets a closing message even if an
        # earlier step (inject / probe / verify / clear) failed,
        # which is precisely the case where they need it most.
        if: ${{ always() && env.NOTIFY_WEBHOOK != '' }}
        continue-on-error: true
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set +e
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          case "$JOB_STATUS" in
            success)
              emoji=":white_check_mark:"
              verb="PASSED"
              detail="Synthetic streak injected, probe paged, Sentry verified, staging cleaned up. No real-world action needed."
              ;;
            cancelled)
              emoji=":warning:"
              verb="CANCELLED"
              detail="The rehearsal job was cancelled mid-run. Confirm staging is no longer in a synthetic stuck-degraded state — see the runbook's *Interpreting a failed rehearsal run* table."
              ;;
            *)
              emoji=":x:"
              verb="FAILED (status=${JOB_STATUS})"
              detail="Walk the failing step in the workflow run; the runbook's *Interpreting a failed rehearsal run* table maps each step to a likely cause. If the cleanup step itself failed, staging is still in a synthetic stuck-degraded state and the per-minute probe will start paging on-call for real until you POST \`/api/_rehearsal/clear-stuck-degraded\` manually."
              ;;
          esac
          text=$(printf '%s\n%s\n%s' \
            "${emoji} *Healthz stuck-degraded rehearsal ${verb}* on staging (${NOTIFY_CHANNEL}, run \`${RUN_ID_TAG}\`)." \
            "${detail}" \
            "Workflow run: ${run_url}")
          payload=$(jq -nc --arg text "$text" '{text: $text}')
          code=$(curl -sS -o /tmp/notify_resp -w '%{http_code}' \
            -X POST -H 'Content-Type: application/json' \
            --data "$payload" "$NOTIFY_WEBHOOK" || echo "000")
          body=$(cat /tmp/notify_resp 2>/dev/null || true)
          if [ "$code" != "200" ] && [ "$code" != "204" ]; then
            echo "::warning::notify webhook returned HTTP $code (body: $body) — rehearsal result NOT posted to ${NOTIFY_CHANNEL}; check webhook URL rotation"
            exit 1
          fi
          echo "result heads-up posted to ${NOTIFY_CHANNEL} (HTTP $code, status=${JOB_STATUS})"

      - name: Summarise rehearsal in run summary
        if: ${{ always() }}
        env:
          MATCHED_EVENT_ID: ${{ steps.verify.outputs.matched_event_id }}
          MATCHED_ISSUE_ID: ${{ steps.verify.outputs.matched_issue_id }}
          MATCHED_ISSUE_SHORT: ${{ steps.verify.outputs.matched_issue_short }}
        run: |
          {
            echo "## Healthz stuck-degraded rehearsal — subsystem: \`$SUBSYSTEM\`"
            echo ""
            echo "- Subsystem: \`$SUBSYSTEM\`"
            echo "- Sentry fingerprint: \`$SENTRY_FINGERPRINT\`"
            echo "- Sentry alert tag: \`$SENTRY_ALERT_TAG\`"
            echo "- Notify (start) status: ${{ steps.notify_start.outcome || 'skipped' }}"
            echo "- Inject status: ${{ steps.inject.outcome }}"
            echo "- Probe status: ${{ steps.probe.outcome }}"
            echo "- Sentry forward status: ${{ steps.forward.outcome }}"
            echo "- Sentry verify status: ${{ steps.verify.outcome }}"
            echo "- Notify (result) status: ${{ steps.notify_result.outcome || 'skipped' }}"
            echo "- Run-id tag: $RUN_ID_TAG"
            # Surface the matched Sentry IDs (when verify reached the
            # assertion phase) so on-call can jump straight to the
            # rehearsed event/issue when triaging a failure or
            # confirming a successful rehearsal — no need to query
            # Sentry by hand with the run-id tag.
            if [ -n "$MATCHED_EVENT_ID" ]; then
              echo "- Matched Sentry event: \`$MATCHED_EVENT_ID\` ([open](https://sentry.io/organizations/${SENTRY_ORG}/issues/?project=${SENTRY_PROJECT}&query=id:$MATCHED_EVENT_ID))"
            fi
            if [ -n "$MATCHED_ISSUE_SHORT" ] && [ -n "$MATCHED_ISSUE_ID" ]; then
              echo "- Matched Sentry issue: \`$MATCHED_ISSUE_SHORT\` ([open](https://sentry.io/organizations/${SENTRY_ORG}/issues/$MATCHED_ISSUE_ID/))"
            fi
            echo ""
            if [ -f probe_output.txt ]; then
              echo "Probe output:"
              echo '```json'
              cat probe_output.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  verify-cron-monitors:
    # Independent of the `rehearse` matrix above. Asserts that the
    # Sentry Cron monitors that the per-minute probe and the daily
    # rehearsal-notify-webhook probe heartbeat into actually exist
    # in the Sentry org and are configured the way the workflows
    # expect. If a monitor is missing (never created, deleted during
    # a Sentry cleanup, or accidentally renamed), the wrapping
    # `sentry-cli monitors run <slug>` call in the per-minute /
    # daily workflows still appears to succeed (sentry-cli treats an
    # unknown slug as auto-upsert by default), but on-call would NOT
    # get paged when the workflow itself stops running -- which is
    # the exact failure mode the heartbeat exists to catch. Same
    # silent-failure mode if the monitor exists but is muted /
    # disabled / on the wrong schedule / missing the production
    # environment / has a zero check-in margin.
    #
    # See docs/runbooks/rate-limit-store.md ("Verifying the
    # heartbeat") -- this job replaces the operator-memory check
    # the runbook used to point at.
    #
    # Runs on the same `HEALTHZ_REHEARSAL_ENABLED` kill switch as
    # the rehearse matrix above so toggling the rehearsal off also
    # silences this check (otherwise we'd flap on every weekly tick
    # for an org that opted out of rehearsals entirely).
    #
    # Runs in parallel with the rehearse matrix and never blocks it
    # (and vice versa): a misconfigured Sentry monitor must not
    # prevent the inject -> probe -> verify -> clear cycle from
    # happening, and a flake in the rehearse matrix must not hide a
    # missing monitor. Each surfaces independently in the workflow
    # run summary.
    name: "Verify Sentry Cron monitors exist & match the workflow schedules"
    if: ${{ vars.HEALTHZ_REHEARSAL_ENABLED == '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SENTRY_ORG: ${{ vars.HEALTHZ_REHEARSAL_SENTRY_ORG }}
      # Reuses the rehearsal Sentry auth token. The Sentry monitor
      # read endpoint requires `org:read` scope (in addition to the
      # `event:read` the rehearse-matrix verify step already needs).
      # The job's first step asserts the token is present and the
      # per-monitor step surfaces a 401/403 response with a clear
      # message pointing operators at the missing scope.
      SENTRY_AUTH_TOKEN: ${{ secrets.HEALTHZ_REHEARSAL_SENTRY_AUTH_TOKEN }}

    steps:
      - name: Verify required config is present
        run: |
          set -e
          missing=()
          [ -n "$SENTRY_ORG" ] || missing+=("vars.HEALTHZ_REHEARSAL_SENTRY_ORG")
          [ -n "$SENTRY_AUTH_TOKEN" ] || missing+=("secrets.HEALTHZ_REHEARSAL_SENTRY_AUTH_TOKEN")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::missing required config for cron monitor verification: ${missing[*]}"
            exit 1
          fi
          echo "ok"

      - name: Assert each cron monitor exists with the expected schedule, environment, and check-in margin
        id: verify_monitors
        run: |
          # Don't let `set -e` short-circuit the loop -- we want to
          # report ALL misconfigured monitors in one workflow run, not
          # fail at the first one and leave operators chasing them
          # one at a time over multiple weekly ticks.
          set +e

          # Quoted-heredoc terminator so nothing inside the function
          # body is expanded at heredoc time.
          cat > /tmp/verify_monitor.sh <<'VERIFY'
          #!/usr/bin/env bash
          # Args: <slug> <expected_schedule>
          # Exit 0 if the monitor exists in the configured Sentry
          # org and matches the workflow's schedule/env/margin
          # expectations; non-zero otherwise. All failure modes emit
          # an `::error::` annotation that is grouped into the run
          # summary by the caller.
          slug="$1"
          expected_schedule="$2"
          url="https://sentry.io/api/0/organizations/${SENTRY_ORG}/monitors/${slug}/"
          # `\n%{http_code}` lets us cleanly split the body from the
          # status line without shelling out to a second curl call.
          resp=$(curl -sS -w '\n%{http_code}' \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H "Accept: application/json" \
            "$url")
          curl_exit=$?
          http_code=$(printf '%s' "$resp" | tail -n 1)
          body=$(printf '%s' "$resp" | sed '$d')

          if [ "$curl_exit" -ne 0 ]; then
            echo "::error::curl exited ${curl_exit} reading Sentry monitor '${slug}' -- network/DNS/TLS failure from the runner; rerun the workflow"
            return 1 2>/dev/null || exit 1
          fi

          case "$http_code" in
            404)
              echo "::error::Sentry Cron monitor '${slug}' does NOT exist in org '${SENTRY_ORG}'. The workflow that wraps itself with 'sentry-cli monitors run ${slug}' will silently stop heartbeating if it ever gets disabled, defeating the entire point of the heartbeat. Create it in Sentry UI -> Crons -> Add Monitor: slug='${slug}', schedule type='crontab', schedule='${expected_schedule}', timezone='UTC', environment='production', non-zero check-in margin. See docs/runbooks/rate-limit-store.md (Heartbeat / 'Verifying the heartbeat')."
              return 1 2>/dev/null || exit 1
              ;;
            401|403)
              echo "::error::Sentry returned HTTP ${http_code} reading monitor '${slug}'. The HEALTHZ_REHEARSAL_SENTRY_AUTH_TOKEN secret needs 'org:read' scope (in addition to the 'event:read' the rehearse-matrix verify step uses) so this job can read monitor configuration. Update the auth token in Sentry -> Settings -> Auth Tokens."
              return 1 2>/dev/null || exit 1
              ;;
            200)
              :
              ;;
            *)
              echo "::error::Sentry returned HTTP ${http_code} reading monitor '${slug}': $(printf '%s' "$body" | head -c 512)"
              return 1 2>/dev/null || exit 1
              ;;
          esac

          # Parse the monitor config. `// empty` keeps jq from
          # printing the literal string "null" when a field is
          # absent, so the assertion messages below stay readable.
          schedule=$(printf '%s' "$body" | jq -r '.config.schedule // empty')
          schedule_type=$(printf '%s' "$body" | jq -r '.config.schedule_type // empty')
          timezone=$(printf '%s' "$body" | jq -r '.config.timezone // empty')
          checkin_margin=$(printf '%s' "$body" | jq -r '.config.checkin_margin // empty')
          status=$(printf '%s' "$body" | jq -r '.status // empty')
          is_muted=$(printf '%s' "$body" | jq -r '.isMuted // false')
          # Sentry's monitor envelope returns environments as a
          # list of `{name, status, ...}` objects. We only need to
          # confirm a `production` entry exists -- the per-env
          # status is irrelevant to "is this monitor wired up at
          # all", which is what this job asserts.
          env_names=$(printf '%s' "$body" | jq -c '[.environments[]?.name // empty]')
          has_production=$(printf '%s' "$body" | jq -r '[.environments[]?.name // empty] | any(. == "production")')

          errors=()
          if [ "$schedule_type" != "crontab" ]; then
            errors+=("schedule_type='${schedule_type}' (expected 'crontab')")
          fi
          if [ "$schedule" != "${expected_schedule}" ]; then
            errors+=("schedule='${schedule}' (expected '${expected_schedule}' -- must match the GH Actions cron expression so Sentry expects exactly the right number of check-ins)")
          fi
          if [ "$timezone" != "UTC" ]; then
            errors+=("timezone='${timezone}' (expected 'UTC' -- GH Actions schedules run in UTC; a mismatched timezone will make Sentry expect check-ins at the wrong wall-clock time and page on every tick)")
          fi
          # checkin_margin must be a positive integer number of
          # minutes. Zero / null / non-numeric all defeat the
          # heartbeat: Sentry would page the instant a runner is
          # even slightly late, which trains operators to ignore
          # the page.
          if ! [[ "$checkin_margin" =~ ^[0-9]+$ ]] || [ "$checkin_margin" -le 0 ]; then
            errors+=("checkin_margin='${checkin_margin}' (expected a positive integer number of minutes -- a zero/null margin pages on the slightest scheduler delay)")
          fi
          if [ "$status" != "active" ]; then
            errors+=("status='${status}' (expected 'active' -- a disabled monitor will never page on missed check-ins)")
          fi
          if [ "$is_muted" = "true" ]; then
            errors+=("isMuted=true (a muted monitor won't page on missed check-ins, defeating the entire heartbeat)")
          fi
          if [ "$has_production" != "true" ]; then
            errors+=("environment 'production' not found in monitor environments (got: ${env_names}). The workflows always pass --environment production, so check-ins will land in an unexpected env and the monitor's production timeline will look permanently dead.")
          fi

          if [ ${#errors[@]} -gt 0 ]; then
            joined=$(printf '%s; ' "${errors[@]}")
            echo "::error::Sentry Cron monitor '${slug}' is misconfigured: ${joined%; }. Update it in Sentry UI -> Crons -> ${slug} -> Edit. See docs/runbooks/rate-limit-store.md (Heartbeat / 'Verifying the heartbeat')."
            return 1 2>/dev/null || exit 1
          fi

          echo "monitor '${slug}' OK (status=${status}, isMuted=${is_muted}, schedule='${schedule}' ${schedule_type}, timezone=${timezone}, checkin_margin=${checkin_margin}m, environments=${env_names})"
          VERIFY
          chmod +x /tmp/verify_monitor.sh

          # The two slugs and their expected GH Actions cron
          # expressions. Keep this list in sync with the
          # `sentry-cli monitors run <slug>` invocation at the
          # bottom of each workflow file -- a renamed slug here
          # without a matching workflow change would assert against
          # the wrong monitor, which is exactly the silent
          # regression this job exists to prevent.
          declare -a SLUGS=(
            "probe-rehearsal-notify-webhook|23 16 * * *"
            "check-healthz-degraded|*/5 * * * *"
          )

          failed=0
          results=()
          for entry in "${SLUGS[@]}"; do
            slug="${entry%%|*}"
            schedule="${entry#*|}"
            echo "::group::verify monitor '${slug}' (expected schedule '${schedule}')"
            bash /tmp/verify_monitor.sh "$slug" "$schedule"
            rc=$?
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then
              results+=("- \`${slug}\`: OK")
            else
              results+=("- \`${slug}\`: FAILED (see annotation above)")
              failed=1
            fi
          done

          {
            echo "## Sentry Cron monitor verification"
            echo ""
            for line in "${results[@]}"; do
              echo "$line"
            done
            echo ""
            if [ "$failed" -ne 0 ]; then
              echo "One or more Sentry Cron monitors are missing or misconfigured. The wrapping \`sentry-cli monitors run <slug>\` calls in the per-minute / daily probe workflows will appear to succeed, but on-call will NOT be paged when those workflows themselves stop running. See docs/runbooks/rate-limit-store.md -- *Heartbeat -- paging when the scheduler itself stops running* and *Daily rehearsal-notify-webhook liveness probe* -- for the required Sentry Cron monitor configuration."
            else
              echo "All cron monitors present and configured correctly. The probe workflows' heartbeat coverage is intact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit $failed
