name: Healthz degraded probe (per-minute)

# Runs the `check-healthz-degraded` CLI probe against the production
# /api/healthz URL on a per-minute cadence and pages on-call (via
# Sentry, level=fatal) when the probe exits non-zero.
#
# Why this workflow exists (see docs/runbooks/rate-limit-store.md
# Step 5): the Sentry rate-based alert
# `rate_limit_redis_failure_threshold_breached` only fires on failure
# *rate* — >N per rolling minute. A slow trickle of failures can keep
# the rate-limit watcher in `degraded` for many minutes without ever
# crossing the per-minute threshold. The CLI probe complements it by
# alerting on streak *duration*, but only fires if something is
# *running* it on a schedule. This workflow is that schedule.
#
# Cadence: GitHub Actions cron has a 5-minute minimum interval, so we
# schedule every 5 minutes and run an inner loop of 5 iterations spaced
# 60 seconds apart inside each run. With the workflow's ~30s boot time,
# the resulting per-iteration cadence is ~60s end-to-end, satisfying
# the "at least once per minute" requirement without paying for an
# external uptime monitor.
#
# Required repo variables / secrets (configured in the GitHub repo
# Settings → Secrets and variables → Actions):
#
#   vars.HEALTHZ_PROBE_ENABLED                — must equal "1" to opt in.
#                                               Acts as a kill switch — set
#                                               to anything else to silence
#                                               the workflow without
#                                               removing the file.
#   vars.HEALTHZ_URL                          — full URL to /api/healthz on
#                                               the production deployment
#                                               (e.g. https://api.epplaa.com/api/healthz).
#                                               REQUIRED — the workflow
#                                               fails fast if missing.
#   vars.HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS  — streak duration that pages.
#                                               Defaults to 300000 (5 min)
#                                               when unset; matches the
#                                               script's own default.
#   vars.HEALTHZ_PROBE_TIMEOUT_MS             — per-request fetch timeout.
#                                               Defaults to 5000.
#   vars.SENTRY_ORG, vars.SENTRY_PROJECT      — Sentry destination. Reused
#                                               from the release workflow
#                                               so on-call sees these
#                                               events in the same project.
#   secrets.HEALTHZ_PROBE_SENTRY_DSN          — DSN used by sentry-cli to
#                                               post the page event AND to
#                                               send Sentry Cron monitor
#                                               check-ins (see "Heartbeat"
#                                               note below). May be the
#                                               same DSN as the api-server
#                                               so the alert lands in the
#                                               same project; kept as a
#                                               separate secret so you can
#                                               rotate it independently of
#                                               the runtime DSN.
#
# Optional chat heads-up (Slack incoming webhook or Teams workflow webhook).
# Mirrors the same degrade-safe pattern the rehearsal workflow uses for its
# start/result heads-up: when the secret is unset the chat path no-ops and
# the rest of the probe behaves identically; when it's set, the probe loop
# posts a real-time message to chat the first time an iteration exits 2
# (page) and again the first time a subsequent iteration in the same run
# goes back to exit 0 (resolved). On-call still gets the Sentry page —
# the chat heads-up exists so #ops sees the incident in real time without
# waiting for someone to re-broadcast the Sentry issue manually.
#
#   secrets.HEALTHZ_PROBE_NOTIFY_WEBHOOK      — Incoming webhook URL. The
#                                               probe POSTs `{"text": ...}`
#                                               which works for both Slack
#                                               incoming webhooks and Teams
#                                               Workflows webhook triggers.
#                                               Stored as a secret because
#                                               the URL is itself the
#                                               credential. Leave unset to
#                                               disable the chat heads-up
#                                               entirely (Sentry path is
#                                               unaffected).
#   vars.HEALTHZ_PROBE_NOTIFY_CHANNEL         — Cosmetic channel label
#                                               (e.g. `#ops`) included in
#                                               the message body so the
#                                               destination is obvious in
#                                               the workflow logs and the
#                                               chat post itself. Defaults
#                                               to `#ops`. The actual
#                                               routing is determined by
#                                               the webhook URL.
#
# Heartbeat / Sentry Cron monitor:
#   The probe loop is wrapped with `sentry-cli monitors run
#   check-healthz-degraded --environment production -- ...`. This sends
#   an `in_progress` check-in at start and an `ok`/`error` check-in at
#   finish to a Sentry Cron monitor with the slug
#   `check-healthz-degraded`. The monitor configuration (schedule,
#   check-in margin, max runtime, environment) is declared in code at
#   `scripts/src/sentryMonitors.config.ts` and pushed to Sentry by the
#   release workflow's `sentry-monitors-sync` job (task #77). The CI
#   `Sentry Cron monitors in sync with workflow cron` step fails the
#   build if the `cron:` value below diverges from the declared
#   `schedule` for this slug — so the two values stay in lockstep.
#   Update both in the same PR. Sentry pages on-call automatically when
#   an expected check-in fails to arrive on time, which catches the
#   failure modes that neither the in-loop `send-event` page nor
#   GitHub's "Failed workflow run" mail can detect: GH Actions outages,
#   the workflow being silently disabled (e.g. auto-disable after 60
#   days of inactivity if HEALTHZ_PROBE_ENABLED is flipped off
#   temporarily), or schedule delays under load.
#
# When secrets/vars are missing the workflow degrades safely:
#   - HEALTHZ_PROBE_ENABLED != "1"            -> job is skipped entirely.
#                                                Note: the Sentry Cron
#                                                monitor will then page
#                                                on missed check-ins,
#                                                which is what we want —
#                                                the kill switch should
#                                                be a deliberate decision,
#                                                not a silent regression.
#   - HEALTHZ_URL missing                     -> the probe itself exits 1
#                                                with a clear stderr line,
#                                                workflow fails (which
#                                                pages via the GitHub
#                                                "Failed workflow run"
#                                                notification).
#   - HEALTHZ_PROBE_SENTRY_DSN missing        -> both Sentry forwarding
#                                                AND the cron-monitor
#                                                heartbeat are skipped,
#                                                but the workflow still
#                                                fails on non-zero probe
#                                                exit so on-call still
#                                                sees the failure in
#                                                GitHub. Configure the
#                                                DSN to get heartbeat
#                                                coverage.
#
# Manual ad-hoc runs are supported via workflow_dispatch — useful when
# tuning the threshold or verifying alerting end-to-end.

on:
  schedule:
    # Source-of-truth for this cron lives alongside the Sentry Cron
    # monitor schedule it heartbeats for, in
    # scripts/src/sentryMonitors.config.ts (slug
    # `check-healthz-degraded`). CI fails the build if the two values
    # disagree — update both in the same PR.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  # Cap the queue at "one running + at most one pending" so a slow run
  # (e.g. install cache miss) can't fan out into a backlog of overlapping
  # invocations. With `cancel-in-progress: false`, GitHub queues the
  # next scheduled tick behind the in-flight run rather than cancelling
  # it; older pending runs in the same group are dropped automatically.
  # Net effect: at most one extra cron-driven run waits behind a slow
  # one, after which the schedule re-aligns. The 5-iteration inner
  # loop already provides per-minute cadence within each run, so a
  # slipped tick widens the worst-case gap to ~minutes (acceptable
  # given the 5-minute streak threshold) rather than dropping coverage
  # entirely.
  group: check-healthz-degraded
  cancel-in-progress: false

jobs:
  probe:
    name: Run /healthz degraded probe loop
    if: ${{ vars.HEALTHZ_PROBE_ENABLED == '1' }}
    runs-on: ubuntu-latest
    # 5 iterations × 60s sleep ≈ 5 min, plus install/boot. Leave
    # generous headroom so a slow runner doesn't kill us mid-loop.
    timeout-minutes: 8

    env:
      HEALTHZ_URL: ${{ vars.HEALTHZ_URL }}
      HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS: ${{ vars.HEALTHZ_DEGRADED_ALERT_THRESHOLD_MS || '300000' }}
      HEALTHZ_PROBE_TIMEOUT_MS: ${{ vars.HEALTHZ_PROBE_TIMEOUT_MS || '5000' }}
      # Optional chat heads-up. NOTIFY_WEBHOOK is empty when the secret
      # is unset, in which case the in-loop notify helper no-ops — the
      # Sentry pager path is unaffected. Same degrade-safe pattern as
      # the rehearsal workflow's start/result chat posts.
      NOTIFY_WEBHOOK: ${{ secrets.HEALTHZ_PROBE_NOTIFY_WEBHOOK }}
      NOTIFY_CHANNEL: ${{ vars.HEALTHZ_PROBE_NOTIFY_CHANNEL || '#ops' }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # sentry-cli is a single static binary; fetching it inline keeps
      # the workflow self-contained without adding a workspace dep.
      # If Sentry isn't configured the install still succeeds — we just
      # never invoke it in the loop below.
      - name: Install sentry-cli
        run: curl -sL https://sentry.io/get-cli/ | INSTALL_DIR=/usr/local/bin sh

      - name: Probe loop (5 iterations, ~60s apart) with cron-monitor heartbeat
        env:
          # Used by sentry-cli send-event to know which project to
          # ingest into, AND by `sentry-cli monitors run` (below) to
          # post the cron-monitor check-ins. SENTRY_ORG / SENTRY_PROJECT
          # are not strictly required for DSN-based ingestion but are
          # passed through so operators can grep for them in
          # failed-workflow audits.
          SENTRY_DSN: ${{ secrets.HEALTHZ_PROBE_SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
        run: |
          # The probe loop body lives in a versioned shared script
          # (.github/scripts/healthz-probe-loop.sh) so the weekly
          # rehearsal workflow can exercise the SAME chat-firing /
          # dedup / JSON-parsing logic against staging — see task #86
          # in docs/runbooks/rate-limit-store.md. Production behaviour
          # is unchanged: with no PROBE_LOOP_* / REHEARSAL_* overrides,
          # the script defaults to 5 iterations × 60s sleep and skips
          # the rehearsal-only mid-loop clear hook. Wrapping the script
          # with `sentry-cli monitors run` (when SENTRY_DSN is set)
          # records cron-monitor check-ins exactly as before.
          PROBE_LOOP_SCRIPT="$GITHUB_WORKSPACE/.github/scripts/healthz-probe-loop.sh"
          if [ ! -x "$PROBE_LOOP_SCRIPT" ]; then chmod +x "$PROBE_LOOP_SCRIPT"; fi

          if [ -n "$SENTRY_DSN" ]; then
            # Cron-monitor heartbeat. `sentry-cli monitors run` posts
            # an `in_progress` check-in before exec'ing the wrapped
            # command and an `ok`/`error` check-in afterwards based on
            # the wrapped command's exit code. The Sentry Cron monitor
            # with slug `check-healthz-degraded` is declared in
            # scripts/src/sentryMonitors.config.ts and synced to Sentry
            # by the release workflow's `sentry-monitors-sync` job;
            # the CI drift check enforces that the `cron:` value above
            # matches the declared schedule. Sentry will page on-call
            # when an expected check-in fails to arrive within its
            # check-in margin — which is the only signal that survives
            # the scheduler itself going away (workflow disabled, GH
            # Actions outage, schedule silently delayed).
            #
            # The wrapper preserves the wrapped command's exit code, so
            # a non-zero loop still fails the workflow step and the
            # GitHub "Failed workflow run" notification still fires as
            # a backstop.
            sentry-cli monitors run \
              --environment production \
              check-healthz-degraded \
              -- "$PROBE_LOOP_SCRIPT"
          else
            echo "::warning::HEALTHZ_PROBE_SENTRY_DSN not configured; cron-monitor heartbeat is disabled — a stopped/disabled workflow will go unnoticed until the next manual review"
            "$PROBE_LOOP_SCRIPT"
          fi
