kind = "web"
previewPath = "/"
title = "Epplaa"
version = "1.0.0"
id = "artifacts/epplaa-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23429

[services.development]
run = "pnpm --filter @workspace/epplaa-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/epplaa-app", "run", "build" ]
publicDir = "artifacts/epplaa-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23429"
BASE_PATH = "/"
