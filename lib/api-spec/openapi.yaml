        description: { type: string }
        hsCode: { type: string }
        originCurrencyCode: { type: string }
        wholesalePriceMinor: { type: integer, minimum: 1 }
        moq: { type: integer, minimum: 1 }
        leadDays: { type: integer, minimum: 0 }
        weightGrams: { type: integer, minimum: 0 }
        dimensions: { type: object, additionalProperties: true }
        images: { type: array, items: { type: string } }
        category: { type: string }
    ManufacturerListingUpdateBody:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        hsCode: { type: string }
        wholesalePriceMinor: { type: integer, minimum: 1 }
        moq: { type: integer, minimum: 1 }
        leadDays: { type: integer, minimum: 0 }
        weightGrams: { type: integer, minimum: 0 }
        dimensions: { type: object, additionalProperties: true }
        images: { type: array, items: { type: string } }
        category: { type: string }
        status: { $ref: "#/components/schemas/ManufacturerListingStatus" }
