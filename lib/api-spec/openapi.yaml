        failureCount: { type: integer }
        windowStartedAtIso: { type: string }
        circuitOpenUntilIso: { type: ["string", "null"] }
        lastEventAtIso: { type: ["string", "null"] }

    DbHealthSnapshot:
      type: object
      description: |
        Live, on-demand Postgres latency probe answered by the
        api-server replica that handled the request. The replica runs a
        small burst of `SELECT 1` queries and reports the resulting
        p50/p95 round-trip time in milliseconds. `state` is `degraded`
        if the burst threw, exceeded the slow-probe threshold, or no
        sample completed.
      required:
        [replicaId, state, sampleCount, p50LatencyMs, p95LatencyMs, lastProbedAtIso, lastSuccessAtIso, lastError]
      properties:
        replicaId:
          type: string
          description: Hostname or `pid:<n>` identifier of the replica that answered.
        state:
          type: string
          enum: [healthy, degraded]
        sampleCount:
          type: integer
          minimum: 0
          description: Number of `SELECT 1` round-trips that completed in this burst.
        p50LatencyMs:
          type: ["number", "null"]
          description: 50th-percentile round-trip in milliseconds, null when sampleCount is 0.
        p95LatencyMs:
          type: ["number", "null"]
          description: 95th-percentile round-trip in milliseconds, null when sampleCount is 0.
        lastProbedAtIso:
          type: string
          description: ISO timestamp when this burst started.
        lastSuccessAtIso:
          type: ["string", "null"]
          description: |
            ISO timestamp of the most recent `SELECT 1` that completed
            in this burst, or null if every probe failed.
        lastError:
          type: ["string", "null"]
          description: |
            Error message from the failing probe(s), or null when the
            full burst succeeded.

    QueueHealthSnapshot:
      type: object
      description: |
        Aggregate row counts of the `notifications_outbox` table, the
        single shared queue the api-server drains every 30s for
        retryable notifications and the periodic background jobs that
        fan out through it (reconciliation, payouts).
      required:
        [state, pendingCount, processingCount, failedCount, oldestPendingAtIso, oldestProcessingAtIso, sampledAtIso]
      properties:
        state:
          type: string
          enum: [healthy, degraded]
          description: |
            `degraded` when there is at least one failed row OR the oldest
            unprocessed row has been waiting longer than the configured
            staleness threshold (default 10 minutes).
        pendingCount:
          type: integer
          minimum: 0
          description: Rows in `pending` status (waiting for the next drain).
        processingCount:
          type: integer
          minimum: 0
          description: Rows currently leased to a worker (`processing`).
        failedCount:
          type: integer
          minimum: 0
          description: Rows that have exhausted retries (`failed`).
        oldestPendingAtIso:
          type: ["string", "null"]
          description: |
            `nextAttemptAt` of the oldest pending row whose attempt time
            has already elapsed, or null when no pending row is overdue.
        oldestProcessingAtIso:
          type: ["string", "null"]
          description: |
            `nextAttemptAt` of the oldest in-flight row, or null when no
            row is currently leased.
        sampledAtIso:
          type: string
          description: ISO timestamp when the snapshot was taken.

    ReplicaDegradedReport:
      type: object
      required: [replicaId, httpStatus, failingChecks, failures]
      properties:
        replicaId:
          type: string
          description: |
            The /healthz + /readyz `replicaId` field the panel groups
            on. Falls back to `pid:<n>` on dev replicas without a
            platform-set HOSTNAME.
        httpStatus:
          type: integer
          description: HTTP status the panel observed from /readyz for this replica.
        failingChecks:
          type: array
          items: { type: string }
          description: |
            Names of checks that were `failed` in the /readyz body.
            Surfaced separately so on-call can scan the failing
            dependency list without parsing the full failures map.
        failures:
          type: object
          additionalProperties: { type: string }
          description: The /readyz body's `failures` map, copied verbatim.
        consecutivePolls:
          type: integer
          minimum: 1
          description: |
            How many consecutive polls the panel observed this replica
            as degraded before reporting. Echoed in the Sentry payload
            so on-call can see whether this was the second consecutive
            poll (the threshold) or a sustained outage the panel has
            been watching for many cycles.
    ReplicaDegradedReportResult:
      type: object
      required: [emitted, replicaId]
      properties:
        emitted:
          type: boolean
          description: True when this report fired a fresh Sentry event.
        dedupReason:
          type: string
          enum: [within_cooldown]
          description: Reason the report was deduped (only set when emitted=false).
        replicaId: { type: string }
    ReplicaRecoveredReport:
      type: object
      required: [replicaId]
      properties:
        replicaId: { type: string }
    ReplicaRecoveredReportResult:
      type: object
      required: [emitted, replicaId]
      properties:
        emitted:
          type: boolean
          description: True when an open alert was closed (Sentry recovery emitted).
        replicaId: { type: string }


