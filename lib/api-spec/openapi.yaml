openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Epplaa API
servers:
  - url: /api
    description: Base API path
tags:
  - { name: health }
  - { name: identity }
  - { name: countries }
  - { name: catalog }
  - { name: streams }
  - { name: replays }
  - { name: fulfillment }
  - { name: promo }
  - { name: cart }
  - { name: checkout }
  - { name: orders }
  - { name: returns }
  - { name: wallet }
  - { name: safety }
  - { name: onboarding }
  - { name: notifications }
  - { name: referrals }
  - { name: follows }
  - { name: wishlist }
  - { name: reviews }
  - { name: discovery }
  - { name: seller }
  - { name: admin }
  - { name: csrf }
  - { name: mfa }
  - { name: manufacturer }
  - { name: wholesale }
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /csrf-token:
    get:
      operationId: issueCsrfToken
      tags: [csrf]
      summary: Issue a CSRF double-submit token (sets the cookie, returns the token)
      description: |
        Issues a fresh CSRF token, sets the `csrf_token` cookie, and returns
        the token in the body so the SPA can echo it as `X-CSRF-Token` on
        mutating requests. This endpoint is itself exempt from CSRF
        verification (see `EXEMPT_PATH_PREFIXES` in the server middleware).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CsrfToken" }

  /me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Get the signed-in user (provisions if first call)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      operationId: updateMe
      tags: [identity]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateMeBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /me/phone:
    patch:
      operationId: linkMyPhone
      tags: [identity]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PhoneLinkBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/otp/start:
    post:
      operationId: startOtp
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/OtpStartBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OtpStartResponse" } } } }
  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/OtpVerifyBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OtpVerifyResponse" } } } }

  /web-push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/VapidPublicKey" } } } }
  /push-tokens:
    post:
      operationId: registerPushToken
      tags: [push]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PushTokenBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PushTokenRegistered" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: deletePushToken
      tags: [push]
      parameters:
        - { in: query, name: token, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /countries:
    get:
      operationId: listCountries
      tags: [countries]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Country" }

  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      parameters:
        - { in: query, name: countryCode, schema: { type: string } }
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Product" } }
  /products/{productId}:
    get:
      operationId: getProduct
      tags: [catalog]
      parameters:
        - { in: path, name: productId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Product" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /streams:
    get:
      operationId: listStreams
      tags: [streams]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Stream" } }
    post:
      operationId: createStream
      tags: [streams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                posterImage: { type: string }
                currentProductId: { type: string }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/StreamWithSecrets" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /streams/{streamId}:
    get:
      operationId: getStream
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Stream" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/go-live:
    post:
      operationId: goLive
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoLiveResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /seller/go-live:
    post:
      operationId: sellerGoLiveBroadcast
      tags: [streams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                streamId: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoLiveResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /streams/_provider/info:
    get:
      operationId: getStreamingProviderInfo
      tags: [streams]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StreamingProviderInfo" } } } }
  /streams/{streamId}/start:
    post:
      operationId: startStream
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StreamWithSecrets" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/stop:
    post:
      operationId: stopStream
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StreamWithSecrets" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/rotate-key:
    post:
      operationId: rotateStreamKey
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StreamWithSecrets" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/playback:
    get:
      operationId: getStreamPlayback
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StreamPlayback" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/messages:
    get:
      operationId: listStreamMessages
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
        - { in: query, name: limit, required: false, schema: { type: integer, minimum: 1, maximum: 200 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [messages]
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/StreamChatMessage" }
    post:
      operationId: sendStreamMessage
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string, maxLength: 280 }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/StreamChatMessage" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
  /streams/{streamId}/messages/{messageId}:
    delete:
      operationId: deleteStreamMessage
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
        - { in: path, name: messageId, required: true, schema: { type: string } }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/mod-config:
    post:
      operationId: updateStreamModConfig
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                slowModeSeconds: { type: integer, minimum: 0, maximum: 300 }
                addBannedWord: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/StreamModConfig" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /streams/{streamId}/moderators:
    get:
      operationId: listStreamModerators
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [moderators]
                properties:
                  moderators:
                    type: array
                    items: { $ref: "#/components/schemas/StreamModerator" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: addStreamModerator
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                fromMessageId: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [moderator, moderators]
                properties:
                  moderator: { $ref: "#/components/schemas/StreamModerator" }
                  moderators:
                    type: array
                    items: { $ref: "#/components/schemas/StreamModerator" }
        "400": { description: Bad Request }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/moderators/{userId}:
    delete:
      operationId: removeStreamModerator
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
        - { in: path, name: userId, required: true, schema: { type: string } }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/moderation-role:
    get:
      operationId: getStreamModerationRole
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [role]
                properties:
                  role: { type: string, enum: [host, mod, viewer] }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /streams/{streamId}/reactions:
    post:
      operationId: addStreamReaction
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind: { type: string, maxLength: 16 }
                count: { type: integer, minimum: 1, maximum: 10 }
      responses:
        "201": { description: Created, content: { application/json: { schema: { type: object, required: [ok], properties: { ok: { type: boolean } } } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /streams/{streamId}/reactions/recent:
    get:
      operationId: listRecentStreamReactions
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
        - { in: query, name: windowSeconds, required: false, schema: { type: integer, minimum: 1, maximum: 300 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [buckets]
                properties:
                  buckets:
                    type: array
                    items: { $ref: "#/components/schemas/StreamReactionBucket" }
  /replays:
    get:
      operationId: listReplays
      tags: [replays]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Replay" } }
  /replays/{replayId}:
    get:
      operationId: getReplay
      tags: [replays]
      parameters:
        - { in: path, name: replayId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Replay" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /fulfillment-locations:
    get:
      operationId: listFulfillmentLocations
      tags: [fulfillment]
      parameters:
        - { in: query, name: countryCode, required: true, schema: { type: string } }
        - { in: query, name: optionId, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/FulfillmentLocation" } }

  /fulfillment/verify-address:
    post:
      operationId: verifyAddress
      tags: [fulfillment]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/VerifyAddressBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AddressVerification" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /fulfillment/rates:
    post:
      operationId: rateShipment
      tags: [fulfillment]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RateShipmentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RateShipmentResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /box/unlock:
    post:
      operationId: unlockBoxReservation
      tags: [fulfillment]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BoxUnlockBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BoxUnlockResponse" } } } }
        "403": { description: Wrong OTP }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Reservation closed }

  /promo-codes/apply:
    post:
      operationId: applyPromoCode
      tags: [promo]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PromoApplyBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PromoApplyResult" } } } }

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Cart" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: clearCart
      tags: [cart]
      responses:
        "204": { description: Cleared }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /cart/items/{productId}:
    put:
      operationId: upsertCartItem
      tags: [cart]
      parameters:
        - { in: path, name: productId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CartItemUpsertBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Cart" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: removeCartItem
      tags: [cart]
      parameters:
        - { in: path, name: productId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Cart" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /checkout-draft:
    get:
      operationId: getCheckoutDraft
      tags: [checkout]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CheckoutDraft" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: putCheckoutDraft
      tags: [checkout]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CheckoutDraft" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CheckoutDraft" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: deleteCheckoutDraft
      tags: [checkout]
      responses:
        "204": { description: Cleared }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Order" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: placeOrder
      tags: [orders]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PlaceOrderBody" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/PlaceOrderResponse" } } } }
        "400": { description: Bad request }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "502": { description: Payment gateway initialization failed }
  /orders/quote:
    post:
      operationId: quoteOrder
      tags: [orders]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PlaceOrderBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrderQuote" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - { in: path, name: orderId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{orderId}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      parameters:
        - { in: path, name: orderId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{orderId}/refund:
    post:
      operationId: refundOrder
      tags: [orders]
      parameters: [{ in: path, name: orderId, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RefundResponse" } } } }
        "400": { description: Refund not eligible }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { description: Gateway refund failed }

  /payments/mode:
    get:
      operationId: getPaymentsMode
      tags: [payments]
      responses:
        "200":
