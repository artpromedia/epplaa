    # ---- Manufacturer & wholesale schemas ---------------------------------
    ManufacturerStatus:
      type: string
      enum: [pending, review, approved, rejected, suspended]
    Manufacturer:
      type: object
      required: [id, userId, originCountry, legalName, contactEmail, contactPhone, exportLicenceNumber, status, application, createdAtIso, updatedAtIso]
      properties:
        id: { type: string }
        userId: { type: string }
        originCountry: { type: string }
        legalName: { type: string }
        contactEmail: { type: string }
        contactPhone: { type: ["string", "null"] }
        exportLicenceNumber: { type: ["string", "null"] }
        status: { $ref: "#/components/schemas/ManufacturerStatus" }
        application:
          oneOf:
            - { type: "null" }
            - { type: object, additionalProperties: true }
        createdAtIso: { type: string }
        updatedAtIso: { type: string }
    ManufacturerMeStatus:
      type: string
      description: |
        `none` when the signed-in user has not started a manufacturer
        application yet; otherwise mirrors `Manufacturer.status`.
      enum: [none, pending, review, approved, rejected, suspended]
    ManufacturerMeResponse:
      type: object
      required: [status, manufacturer]
      properties:
        status: { $ref: "#/components/schemas/ManufacturerMeStatus" }
        manufacturer:
          oneOf:
            - { type: "null" }
            - { $ref: "#/components/schemas/Manufacturer" }
    ManufacturerApplyBody:
      type: object
      required: [originCountry, legalName]
      properties:
        originCountry: { type: string }
        legalName: { type: string }
        contactEmail: { type: string }
        contactPhone: { type: string }
        exportLicenceNumber: { type: string }
        application: { type: object, additionalProperties: true }
    ManufacturerKycStatus:
      type: string
      enum: [pending, approved, rejected]
    ManufacturerKyc:
      type: object
      required: [id, manufacturerId, kind, documentUrl, status, reviewedBy, reviewedAtIso, rejectReason, createdAtIso, updatedAtIso]
      properties:
        id: { type: string }
        manufacturerId: { type: string }
        kind: { type: string }
        documentUrl: { type: string }
        status: { $ref: "#/components/schemas/ManufacturerKycStatus" }
        reviewedBy: { type: ["string", "null"] }
        reviewedAtIso: { type: ["string", "null"] }
        rejectReason: { type: ["string", "null"] }
        createdAtIso: { type: string }
        updatedAtIso: { type: string }
    ManufacturerKycUploadBody:
      type: object
      required: [kind, documentUrl]
      properties:
        kind:
          type: string
          enum: [export_licence, business_registration, tax_id, ubo, factory_audit]
        documentUrl: { type: string }
    ManufacturerListingStatus:
      type: string
      enum: [draft, active, paused]
    ManufacturerListing:
      type: object
      required: [id, manufacturerId, sku, title, description, hsCode, originCountry, originCurrencyCode, wholesalePriceMinor, moq, leadDays, weightGrams, dimensions, images, category, status, createdAtIso, updatedAtIso]
      properties:
        id: { type: string }
        manufacturerId: { type: string }
        sku: { type: string }
        title: { type: string }
        description: { type: string }
        hsCode: { type: string }
        originCountry: { type: string }
        originCurrencyCode: { type: string }
        wholesalePriceMinor: { type: integer }
        moq: { type: integer }
        leadDays: { type: integer }
        weightGrams: { type: integer }
        dimensions:
          oneOf:
            - { type: "null" }
            - { type: object, additionalProperties: true }
        images: { type: array, items: { type: string } }
        category: { type: string }
        status: { $ref: "#/components/schemas/ManufacturerListingStatus" }
        createdAtIso: { type: string }
        updatedAtIso: { type: string }
    ManufacturerListingCreateBody:
      type: object
      required: [title, hsCode, originCurrencyCode, wholesalePriceMinor]
      properties:
        sku: { type: string }
