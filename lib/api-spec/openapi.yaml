openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Epplaa API
servers:
  - url: /api
    description: Base API path
tags:
  - { name: health }
  - { name: identity }
  - { name: countries }
  - { name: catalog }
  - { name: streams }
  - { name: replays }
  - { name: fulfillment }
  - { name: promo }
  - { name: cart }
  - { name: checkout }
  - { name: orders }
  - { name: returns }
  - { name: wallet }
  - { name: safety }
  - { name: onboarding }
  - { name: notifications }
  - { name: referrals }
  - { name: follows }
  - { name: wishlist }
  - { name: reviews }
  - { name: discovery }
  - { name: seller }
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Get the signed-in user (provisions if first call)
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      operationId: updateMe
      tags: [identity]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/UpdateMeBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /me/phone:
    patch:
      operationId: linkMyPhone
      tags: [identity]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PhoneLinkBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /auth/otp/start:
    post:
      operationId: startOtp
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/OtpStartBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OtpStartResponse" } } } }
  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/OtpVerifyBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OtpVerifyResponse" } } } }

  /web-push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/VapidPublicKey" } } } }
  /push-tokens:
    post:
      operationId: registerPushToken
      tags: [push]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PushTokenBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PushTokenRegistered" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: deletePushToken
      tags: [push]
      parameters:
        - { in: query, name: token, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /countries:
    get:
      operationId: listCountries
      tags: [countries]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Country" }

  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      parameters:
        - { in: query, name: countryCode, schema: { type: string } }
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Product" } }
  /products/{productId}:
    get:
      operationId: getProduct
      tags: [catalog]
      parameters:
        - { in: path, name: productId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Product" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /streams:
    get:
      operationId: listStreams
      tags: [streams]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Stream" } }
  /streams/{streamId}:
    get:
      operationId: getStream
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Stream" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /streams/{streamId}/go-live:
    post:
      operationId: goLive
      tags: [streams]
      parameters:
        - { in: path, name: streamId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoLiveResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /seller/go-live:
    post:
      operationId: sellerGoLiveBroadcast
      tags: [streams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                streamId: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/GoLiveResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "400": { $ref: "#/components/responses/BadRequest" }

  /replays:
    get:
      operationId: listReplays
      tags: [replays]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Replay" } }
  /replays/{replayId}:
    get:
      operationId: getReplay
      tags: [replays]
      parameters:
        - { in: path, name: replayId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Replay" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /fulfillment-locations:
    get:
      operationId: listFulfillmentLocations
      tags: [fulfillment]
      parameters:
        - { in: query, name: countryCode, required: true, schema: { type: string } }
        - { in: query, name: optionId, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/FulfillmentLocation" } }

  /fulfillment/verify-address:
    post:
      operationId: verifyAddress
      tags: [fulfillment]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/VerifyAddressBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/AddressVerification" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /fulfillment/rates:
    post:
      operationId: rateShipment
      tags: [fulfillment]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RateShipmentBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RateShipmentResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }

  /box/unlock:
    post:
      operationId: unlockBoxReservation
      tags: [fulfillment]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BoxUnlockBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/BoxUnlockResponse" } } } }
        "403": { description: Wrong OTP }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Reservation closed }

  /promo-codes/apply:
    post:
      operationId: applyPromoCode
      tags: [promo]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PromoApplyBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PromoApplyResult" } } } }

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Cart" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: clearCart
      tags: [cart]
      responses:
        "204": { description: Cleared }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /cart/items/{productId}:
    put:
      operationId: upsertCartItem
      tags: [cart]
      parameters:
        - { in: path, name: productId, required: true, schema: { type: string } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CartItemUpsertBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Cart" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: removeCartItem
      tags: [cart]
      parameters:
        - { in: path, name: productId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Cart" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /checkout-draft:
    get:
      operationId: getCheckoutDraft
      tags: [checkout]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CheckoutDraft" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: putCheckoutDraft
      tags: [checkout]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CheckoutDraft" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/CheckoutDraft" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    delete:
      operationId: deleteCheckoutDraft
      tags: [checkout]
      responses:
        "204": { description: Cleared }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Order" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: placeOrder
      tags: [orders]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PlaceOrderBody" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/PlaceOrderResponse" } } } }
        "400": { description: Bad request }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "502": { description: Payment gateway initialization failed }
  /orders/quote:
    post:
      operationId: quoteOrder
      tags: [orders]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/PlaceOrderBody" } } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/OrderQuote" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - { in: path, name: orderId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{orderId}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      parameters:
        - { in: path, name: orderId, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /orders/{orderId}/refund:
    post:
      operationId: refundOrder
      tags: [orders]
      parameters: [{ in: path, name: orderId, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/RefundResponse" } } } }
        "400": { description: Refund not eligible }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { description: Gateway refund failed }

  /payments/mode:
    get:
      operationId: getPaymentsMode
      tags: [payments]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [mode]
                properties:
                  mode: { type: string }

  /payments/intents/{intentId}:
    get:
      operationId: getPaymentIntent
      tags: [payments]
      parameters: [{ in: path, name: intentId, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentIntent" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /payments/intents/{intentId}/verify:
    post:
      operationId: verifyPaymentIntent
      tags: [payments]
      parameters: [{ in: path, name: intentId, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentIntent" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/payment-gateway-health:
    get:
      operationId: adminGetGatewayHealth
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GatewayHealthSnapshot" }
        "403": { description: Forbidden }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/reconciliation-runs:
    get:
      operationId: adminListReconciliationRuns
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReconciliationRun" }
        "403": { description: Forbidden }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/reconciliation/run:
    post:
      operationId: adminRunReconciliation
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean }, runs: { type: integer } }
        "403": { description: Forbidden }

  /admin/payouts/run-due:
    post:
      operationId: adminRunDuePayouts
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { ok: { type: boolean }, processed: { type: integer }, failed: { type: integer } }
        "403": { description: Forbidden }

  /admin/payment-intents:
    get:
      operationId: adminListPaymentIntents
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PaymentIntent" }
        "403": { description: Forbidden }

  /returns:
    get:
      operationId: listReturns
      tags: [returns]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ReturnRecord" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createReturn
      tags: [returns]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateReturnBody" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/ReturnRecord" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /returns/{returnId}:
    get:
      operationId: getReturn
      tags: [returns]
      parameters: [{ in: path, name: returnId, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReturnRecord" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /returns/{returnId}/transitions:
    post:
      operationId: transitionReturn
      tags: [returns]
      parameters: [{ in: path, name: returnId, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReturnRecord" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /returns/{returnId}/messages:
    post:
      operationId: appendReturnMessage
      tags: [returns]
      parameters: [{ in: path, name: returnId, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor, body]
              properties:
                actor: { type: string }
                body: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/ReturnRecord" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Wallet" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /wallet/topup:
    post:
      operationId: walletTopUp
      tags: [wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountMinor]
              properties:
                amountMinor: { type: integer }
                label: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/WalletTopupResponse" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "502": { description: Top-up payment init failed }
  /wallet/spend:
    post:
      operationId: walletSpend
      tags: [wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountMinor, label]
              properties:
                amountMinor: { type: integer }
                label: { type: string }
                refId: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Wallet" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /wallet/withdraw:
    post:
      operationId: walletWithdraw
      tags: [wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountMinor, destinationLabel, bankCode, bankAccount]
              properties:
                amountMinor: { type: integer }
                destinationLabel: { type: string }
                bankCode: { type: string }
                bankAccount: { type: string, description: "Full destination account number (digits only)." }
                bankAccountName: { type: string }
                bankLast4: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/WalletWithdrawResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /wallet/refund:
    post:
      operationId: walletRefund
      tags: [wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [returnId, amountMinor, label]
              properties:
                returnId: { type: string }
                amountMinor: { type: integer }
                label: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Wallet" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /wallet/settings:
    patch:
      operationId: updateWalletSettings
      tags: [wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currencyCode]
              properties:
                currencyCode: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Wallet" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /safety/reports:
    get:
      operationId: listSafetyReports
      tags: [safety]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SafetyReport" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: submitSafetyReport
      tags: [safety]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SubmitSafetyReportBody" } } }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/SafetyReport" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /safety/blocked:
    get:
      operationId: listBlockedSellers
      tags: [safety]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/BlockedSeller" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: blockSeller
      tags: [safety]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sellerName]
              properties:
                sellerName: { type: string }
