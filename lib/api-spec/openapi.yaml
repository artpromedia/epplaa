      tags: [payments]
      parameters: [{ in: path, name: intentId, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentIntent" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/payment-gateway-health:
    get:
      operationId: adminGetGatewayHealth
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GatewayHealthSnapshot" }
        "403": { description: Forbidden }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/db-health:
    get:
      operationId: adminGetDbHealth
      tags: [admin]
      summary: Per-replica Postgres latency snapshot
      description: |
        Runs a small burst of `SELECT 1` probes on the api-server's
        Postgres pool and returns the p50/p95 round-trip time plus the
        timestamp of the last successful probe. Used by the admin
        status page to show whether the api-server's primary backing
        store is responding within expected limits.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DbHealthSnapshot" }
        "403": { description: Forbidden }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/queue-health:
    get:
      operationId: adminGetQueueHealth
      tags: [admin]
      summary: Background notification-outbox queue depth
      description: |
        Aggregate counts of pending vs in-flight (processing) vs failed
        rows in the `notifications_outbox` table, plus the timestamp of
        the oldest unprocessed row. This is the same queue the
        scheduler drains every 30s for retryable notifications and
        recurring jobs (reconciliation, payouts) that fan out through
        it.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QueueHealthSnapshot" }
        "403": { description: Forbidden }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /admin/replica-degraded-alerts:
    post:
      operationId: adminReportReplicaDegraded
      tags: [admin]
      summary: |
        Report a degraded replica observed by the admin status panel.
        The server dedups across operators / tabs and pages on-call
        (Sentry) at most once per outage window per replicaId.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplicaDegradedReport" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplicaDegradedReportResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Forbidden }

  /admin/replica-degraded-alerts/recovery:
    post:
      operationId: adminReportReplicaRecovered
      tags: [admin]
      summary: |
        Report a previously-degraded replica is healthy again. Closes
        any open alert in the dedup table and emits a Sentry recovery
        event so on-call sees the all-clear without manually
        resolving the issue.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplicaRecoveredReport" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplicaRecoveredReportResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Forbidden }

