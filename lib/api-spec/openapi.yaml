    MfaStatus:
      type: object
      required:
        [
          enrolled,
          kind,
          enrolledAt,
          lastUsedAt,
          backupCodesRemaining,
          recentlyAsserted,
          sessionVerified,
          required,
          requiredReason,
          velocityNgnMinor,
          velocityThresholdNgnMinor,
        ]
      properties:
        enrolled: { type: boolean }
        kind: { type: ["string", "null"], enum: ["totp", null] }
        enrolledAt: { type: ["string", "null"] }
        lastUsedAt: { type: ["string", "null"] }
        backupCodesRemaining: { type: integer }
        recentlyAsserted: { type: boolean }
        sessionVerified:
          type: boolean
          description: >-
            True when the current Clerk session has a verified second factor
            (the `fva` JWT claim reports a non-negative second-factor
            verification age). Source of truth for whether the operator-MFA
            gate (`requireRole`) will let admin-console requests through:
            even an enrolled operator must re-verify in the active session
            before they can act, so a stolen primary session cannot be
            weaponised. Stays in sync with Clerk-native factors (TOTP,
            passkey, WebAuthn) — not only the in-house TOTP enrolment.
        required: { type: boolean }
        requiredReason:
          type: ["string", "null"]
          enum: ["admin_role", "high_velocity", null]
        velocityNgnMinor: { type: integer }
        velocityThresholdNgnMinor: { type: integer }
    MfaSetupBody:
      type: object
      properties:
        accountLabel: { type: string, description: "Label rendered in the authenticator app (defaults to user id)." }
    MfaSetupResult:
      type: object
      required: [enrollmentId, otpauthUrl, qrCodeDataUrl, secret, backupCodes]
      properties:
        enrollmentId: { type: string }
        otpauthUrl: { type: string }
        qrCodeDataUrl: { type: string }
        secret: { type: string }
        backupCodes:
          type: array
          items: { type: string }
    MfaVerifyBody:
      type: object
      required: [code]
      properties:
        code: { type: string, description: "6-digit TOTP code." }
        mode:
          type: string
          enum: [activate, assert]
          description: "activate flips a pending enrolment to active; assert satisfies a recent challenge for an already-active factor."
    MfaBackupCodeBody:
      type: object
      required: [code]
      properties:
        code: { type: string }
    MfaBackupCodesResult:
      type: object
      required: [backupCodes]
      properties:
