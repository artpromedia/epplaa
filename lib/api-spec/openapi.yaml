        notifiedAtIso: { type: ["string", "null"] }
        notes: { type: string }
        createdAtIso: { type: string }
        caseId: { type: ["string", "null"] }
        caseStatus: { type: ["string", "null"] }
    TakedownAppealResult:
      type: object
      required: [id, caseId, caseStatus, appealedAtIso]
      properties:
        id: { type: string }
        caseId: { type: string }
        caseStatus: { type: string }
        appealedAtIso: { type: string }
    ModerationScanResult:
      type: object
      required: [blocked, decision, scanId]
      properties:
        blocked: { type: boolean }
        caseId: { type: ["string", "null"] }
        decision: { type: string }
