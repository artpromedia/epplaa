        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SellerProfile" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/upgrade:
    post:
      operationId: upgradeSellerTier
      tags: [seller]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier: { type: string, enum: [starter, pro, elite] }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SellerProfile" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/listings:
    get:
      operationId: listSellerListings
      tags: [seller]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SellerListing" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createSellerListing
      tags: [seller]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, priceMinor, countryCode]
              properties:
                title: { type: string }
                priceMinor: { type: integer }
                countryCode: { type: string }
                category: { type: string }
                inventory: { type: integer }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/SellerListing" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/listings/{listingId}:
    delete:
      operationId: deleteSellerListing
      tags: [seller]
      parameters: [{ in: path, name: listingId, required: true, schema: { type: string } }]
      responses:
        "204": { description: Deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      operationId: updateSellerListing
      tags: [seller]
      parameters: [{ in: path, name: listingId, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                priceMinor: { type: integer }
                category: { type: string }
                inventory: { type: integer }
                status: { type: string, enum: [draft, active] }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SellerListing" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/orders:
    get:
      operationId: listSellerOrders
      tags: [seller]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SellerOrder" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/orders/{sellerOrderId}/transitions:
    post:
      operationId: transitionSellerOrder
      tags: [seller]
      parameters: [{ in: path, name: sellerOrderId, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string }
                trackingNote: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/SellerOrder" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/streams:
    get:
      operationId: listSellerStreams
      tags: [seller]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SellerStreamRecord" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/earnings:
    get:
      operationId: getSellerEarnings
      tags: [seller]
      parameters:
        - { in: query, name: countryCode, required: true, schema: { type: string } }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/EarningsSummary" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/payouts:
    post:
      operationId: requestSellerPayout
      tags: [seller]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountMinor]
              properties:
                amountMinor: { type: integer }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Payout" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /seller/payouts/{payoutId}/mark-paid:
    post:
      operationId: markSellerPayoutPaid
      tags: [seller]
      parameters: [{ in: path, name: payoutId, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Payout" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ---- KYC ---------------------------------------------------------------
  # Sellers move through tiers 1 → 3 as their rolling-30d GMV crosses
  # NGN 500k and NGN 5M thresholds. Each tier requires more verifications
  # (gov_id, bank, CAC, UBO). Documents are uploaded under signed URLs
  # (or inline encrypted in dev) and reviewed by an admin.
  /kyc/me:
    get:
      operationId: getKycStatus
      tags: [kyc]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/KycStatus" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /kyc/documents:
    post:
      operationId: claimKycDocument
      tags: [kyc]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, contentType, filename, sizeBytes]
              properties:
                kind: { type: string, description: "gov_id | bank_verification | cac | ubo | selfie | address_proof" }
                contentType: { type: string }
                filename: { type: string }
                sizeBytes: { type: integer }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [id, uploadPath]
                properties:
                  id: { type: string }
                  uploadPath: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /kyc/documents/{id}/upload:
    put:
      operationId: uploadKycDocument
      tags: [kyc]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [blobBase64]
              properties:
                blobBase64: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, sha256]
                properties:
                  ok: { type: boolean }
                  sha256: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /kyc/documents/{id}:
    get:
      operationId: getKycDocument
      tags: [kyc]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [id, kind, status, contentType, filename]
                properties:
                  id: { type: string }
                  kind: { type: string }
                  status: { type: string }
                  contentType: { type: string }
                  filename: { type: string }
                  blobBase64: { type: ["string", "null"] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /kyc/start:
    post:
      operationId: startKycVerification
      tags: [kyc]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind]
              properties:
                kind: { type: string, description: "gov_id | bank_verification | cac | ubo" }
                tier: { type: integer, enum: [1, 2, 3] }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string }
                  status: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /kyc/verifications/{id}/submit:
    post:
      operationId: submitKycVerification
      tags: [kyc]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                documentIds:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string }
                  status: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---- Admin KYC -------------------------------------------------------
  /admin/kyc/pending:
    get:
      operationId: listPendingKyc
      tags: [admin]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminKycVerification" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /admin/kyc/{id}/approve:
    post:
      operationId: approveKycVerification
      tags: [admin]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /admin/kyc/{id}/reject:
    post:
      operationId: rejectKycVerification
      tags: [admin]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /admin/kyc/{id}:
    get:
      operationId: getAdminKycDetail
      tags: [admin]
      summary: Verification detail with attached document metadata.
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminKycVerificationDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /admin/kyc/documents/{id}:
    get:
      operationId: getAdminKycDocumentBlob
      tags: [admin]
      summary: Decrypted document blob (base64) for review thumbnail rendering. PII read.
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminKycDocumentBlob" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---- Sanctions / PEP screening review queue --------------------------
  /admin/sanctions:
    get:
      operationId: listAdminSanctionsHits
      tags: [admin]
      summary: List sanctions / PEP screening rows. Filterable by status.
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [all, pending, flagged, blocked, clear]
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminSanctionsPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ---- NDPR data-subject request review queue (admin) ------------------
  /admin/ndpr/requests:
    get:
      operationId: listAdminNdprRequests
      tags: [admin]
      summary: List data-subject requests across all users.
      parameters:
        - in: query
          name: kind
          required: false
          schema:
            type: string
            enum: [all, export, erase, rectify, restrict, portability]
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [all, pending, ready, completed, cancelled, failed]
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminNdprPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /admin/ndpr/requests/{id}/cancel:
    post:
      operationId: cancelAdminNdprRequest
      tags: [admin]
      summary: Operator cancels a pending NDPR request (typically a within-grace erase).
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminNdprRow" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Not cancellable, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  # ---- Audit log search (admin) ----------------------------------------
  /admin/audit:
    get:
      operationId: searchAdminAuditLog
      tags: [admin]
      summary: Search the append-only audit log by actor, entity, action, or date.
      parameters:
        - in: query
          name: actorId
          required: false
          schema: { type: string }
        - in: query
          name: entity
          required: false
          schema: { type: string }
        - in: query
          name: entityId
          required: false
          schema: { type: string }
        - in: query
          name: action
          required: false
          schema: { type: string, description: "Exact action verb or prefix (e.g. ndpr.* matches ndpr.export.requested)." }
        - in: query
          name: piiOnly
          required: false
          schema: { type: boolean }
        - in: query
          name: sinceIso
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminAuditPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ---- Rate-limit forensic search (admin) -----------------------------
  /admin/rate-limit-events:
    get:
      operationId: listAdminRateLimitEvents
      tags: [admin]
      summary: |
        Forensic search of the bounded `rate_limit_events` table (90-day
        window). Lets admins reconstruct credential-stuffing or scraping
        bursts after the fact, filtered by identity / route / tier /
        time window. The search itself is audited.
      parameters:
        - in: query
          name: identity
          required: false
          schema: { type: string, description: "Identity key — usually 'user:<id>' or 'ip:<addr>'. Case-sensitive exact match." }
        - in: query
          name: route
          required: false
          schema: { type: string, description: "Request path the rate limit fired on. Substring (LIKE) match." }
        - in: query
          name: tier
          required: false
          schema: { type: string, description: "anon | buyer | seller | admin" }
        - in: query
          name: sinceIso
          required: false
          schema: { type: string }
        - in: query
          name: untilIso
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 500 }
        - in: query
          name: offset
          required: false
          schema: { type: integer, minimum: 0 }
        - in: query
          name: sortDir
          required: false
          schema:
            type: string
            enum: [desc, asc]
            description: |
              Direction to sort by `ts`. Defaults to `desc` (newest first)
              which is the typical "what just happened" view; `asc`
              (oldest first) is useful for replaying a burst from its
              beginning.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminRateLimitEventPage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ---- NDPR ------------------------------------------------------------
  # Nigeria Data Protection Regulation — data-subject rights. All write
  # operations are audited and create rows in `ndpr_requests`.
  /ndpr/requests:
    get:
      operationId: listNdprRequests
      tags: [ndpr]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NdprRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /ndpr/requests/{id}:
    get:
      operationId: getNdprRequest
      tags: [ndpr]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/NdprRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /ndpr/export:
    post:
      operationId: requestNdprExport
      tags: [ndpr]
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/NdprRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /ndpr/portability:
    post:
      operationId: requestNdprPortability
      tags: [ndpr]
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/NdprRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /ndpr/erase:
    post:
      operationId: requestNdprErase
      tags: [ndpr]
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/NdprRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /ndpr/requests/{id}/cancel:
    post:
      operationId: cancelNdprRequest
      tags: [ndpr]
      parameters: [{ in: path, name: id, required: true, schema: { type: string } }]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/NdprRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /ndpr/rectify:
    post:
      operationId: requestNdprRectify
      tags: [ndpr]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patch]
              properties:
                patch:
                  type: object
                  additionalProperties: true
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/NdprRequest" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /ndpr/restrict:
    post:
      operationId: requestNdprRestrict
      tags: [ndpr]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                lift: { type: boolean }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/NdprRequest" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # --- MFA (TOTP enrolment) ---------------------------------------------------
  /mfa/status:
    get:
      operationId: getMfaStatus
      tags: [mfa]
      summary: Returns enrolment + assertion status and whether MFA is required for this user.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MfaStatus" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /mfa/totp/setup:
    post:
      operationId: setupMfaTotp
      tags: [mfa]
      summary: Begin TOTP enrolment. Returns secret, otpauth URL, QR data URL, and one-time backup codes.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MfaSetupBody" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/MfaSetupResult" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { description: Setup failed, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
  /mfa/totp/verify:
    post:
      operationId: verifyMfaTotp
      tags: [mfa]
      summary: Verify a 6-digit TOTP code. mode=activate flips a pending enrolment to active; mode=assert satisfies a recent-challenge requirement.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MfaVerifyBody" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { description: Code rejected, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
  /mfa/backup-code:
    post:
      operationId: consumeMfaBackupCode
      tags: [mfa]
      summary: Consume a single-use backup code as an MFA assertion.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MfaBackupCodeBody" }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { description: Code rejected, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
  /mfa/totp/disable:
    post:
      operationId: disableMfaTotp
      tags: [mfa]
      summary: Remove the TOTP factor. Requires a recent assertion; otherwise returns 403.
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Ok" } } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /mfa/totp/regenerate-backup-codes:
    post:
      operationId: regenerateMfaBackupCodes
      tags: [mfa]
      summary: Issue a fresh batch of 10 single-use backup codes, replacing the existing ones. Requires a recent assertion; otherwise returns 403.
      responses:
