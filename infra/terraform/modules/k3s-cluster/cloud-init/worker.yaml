#cloud-config
# k3s worker (agent) bootstrap.

hostname: ${cluster}-w-${node_index}

package_update: true
package_upgrade: false

packages:
  - curl
  - ca-certificates

runcmd:
  - sysctl -w net.bridge.bridge-nf-call-iptables=1
  - sysctl -w net.ipv4.ip_forward=1
  - |
    until curl -sk "${join_url}" >/dev/null 2>&1; do
      echo "waiting for control-plane LB at ${join_url}…"
      sleep 5
    done
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION=v1.31.4+k3s1 sh -s - agent \
      --server "${join_url}" \
      --token "${k3s_token}"
