apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.vault.secretName }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.vault.storeRef.name }}
    kind: {{ .Values.vault.storeRef.kind }}
  target:
    name: {{ .Values.vault.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: TUNNEL_TOKEN
      remoteRef:
        key: {{ .Values.vault.remoteKey }}
        property: {{ .Values.vault.property }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
data:
  config.yaml: |
    tunnel: ${TUNNEL_ID}
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
{{- range .Values.ingressRules }}
      - {{- if .hostname }} hostname: {{ .hostname }}{{- end }}
        service: {{ .service }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: { app.kubernetes.io/name: cloudflared }
  template:
    metadata:
      labels: { app.kubernetes.io/name: cloudflared }
    spec:
      containers:
        - name: cloudflared
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["tunnel", "--config", "/etc/cloudflared/config.yaml", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.secretName }}
                  key: TUNNEL_TOKEN
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          ports:
            - { name: metrics, containerPort: 2000 }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/cloudflared }
      volumes:
        - name: config
          configMap: { name: cloudflared-config }
---
apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  labels: { release: kube-prometheus-stack }
spec:
  selector: { app.kubernetes.io/name: cloudflared }
  ports:
    - { name: metrics, port: 2000, targetPort: metrics }
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudflared
  labels: { release: kube-prometheus-stack }
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: cloudflared }
  endpoints:
    - { port: metrics, path: /metrics, interval: 30s }
