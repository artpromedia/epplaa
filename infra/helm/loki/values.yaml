loki:
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: s3
          schema: v13
          index: { prefix: loki_index_, period: 24h }
    storage:
      type: s3
      bucketNames:
        chunks: epplaa-loki-chunks
        ruler: epplaa-loki-ruler
      s3:
        endpoint: https://fsn1.your-objectstorage.com
        s3ForcePathStyle: true
        # accessKeyId/secretAccessKey supplied by ExternalSecret.
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 2
    persistence:
      enabled: true
      size: 30Gi
  monitoring:
    serviceMonitor:
      enabled: true
      labels:
        release: kube-prometheus-stack
