opentelemetry-collector:
  mode: deployment
  replicaCount: 2
  image:
    repository: otel/opentelemetry-collector-contrib
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 0
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      hostPort: 0
      protocol: TCP
  config:
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch: { timeout: 5s, send_batch_size: 1024 }
      resourcedetection:
        detectors: [env, system]
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 20
    exporters:
      otlphttp/tempo:
        endpoint: http://tempo.observability:4318
        tls: { insecure: true }
      prometheusremotewrite:
        endpoint: http://prometheus-operated.observability:9090/api/v1/write
        tls: { insecure: true }
      loki:
        endpoint: http://loki.observability:3100/loki/api/v1/push
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [otlphttp/tempo]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resourcedetection, batch]
          exporters: [loki]
  resources:
    limits: { cpu: 1, memory: 1Gi }
    requests: { cpu: 200m, memory: 256Mi }
