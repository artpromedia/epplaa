# ClusterSecretStore — every chart's `vault.storeRef` points at this.
#
# Auth: Kubernetes auth method on the Vault side, ServiceAccount token from
# the `external-secrets` namespace. The Vault role `external-secrets`
# is bound to a policy that can read kv-v2 paths under `secret/epplaa/*`.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault:8200"
      path: "secret"
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
