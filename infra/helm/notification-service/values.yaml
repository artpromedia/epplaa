image:
  repository: ghcr.io/artpromedia/notification-service
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 3200

resources:
  requests: { cpu: 50m, memory: 128Mi }
  limits:   { cpu: 300m, memory: 384Mi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget: { enabled: true, minAvailable: 1 }

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile: { type: RuntimeDefault }

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: [ALL] }

ephemeralVolumes:
  - { name: tmp, mountPath: /tmp }

config:
  NODE_ENV: production
  PORT: "3200"
  OTEL_SERVICE_NAME: epplaa-notification-service
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability:4318
  REDIS_URL: redis://redis-master.data:6379
  # Phase 4 strangler-fig: this flag is read once draining is wired in.
  NOTIFICATION_DRAIN_ENABLED: "false"

vault:
  enabled: true
  storeRef: { name: vault-backend, kind: ClusterSecretStore }
  refreshInterval: 1h
  secrets:
    - name: notification-service-core
      keys:
        - DATABASE_URL: { remoteKey: epplaa/notification-service, property: database_url }
        - SMTP_URL:     { remoteKey: epplaa/notification-service, property: smtp_url }
        - TWILIO_AUTH:  { remoteKey: epplaa/notification-service, property: twilio_auth }

probes:
  liveness:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    httpGet: { path: /healthz, port: http }
    initialDelaySeconds: 5
    periodSeconds: 5

serviceMonitor: { enabled: true, interval: 30s, path: /metrics, port: http }

ingress: { enabled: false }

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels: { app.kubernetes.io/name: notification-service }
