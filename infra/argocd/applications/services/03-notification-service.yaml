apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
  annotations:
    argocd-image-updater.argoproj.io/image-list: notification=ghcr.io/artpromedia/notification-service
    argocd-image-updater.argoproj.io/notification.update-strategy: digest
    argocd-image-updater.argoproj.io/notification.allow-tags: "regexp:^sha-[a-f0-9]{12}$"
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: services
  source:
    repoURL: https://github.com/artpromedia/epplaa
    targetRevision: main
    path: infra/helm/notification-service
    helm: { valueFiles: [values.yaml] }
  destination:
    server: https://kubernetes.default.svc
    namespace: notifications
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
