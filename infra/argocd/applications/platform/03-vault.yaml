apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: platform
  source:
    repoURL: https://github.com/artpromedia/epplaa
    targetRevision: main
    path: infra/helm/vault
    helm: { valueFiles: [values.yaml] }
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated: { prune: false, selfHeal: false }  # Vault deserves manual prune.
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
