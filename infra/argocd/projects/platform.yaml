apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Substrate components — ingress, observability, secrets, GitOps.
  sourceRepos: ["https://github.com/artpromedia/epplaa"]
  destinations:
    - { namespace: "*", server: https://kubernetes.default.svc }
  clusterResourceWhitelist:
    - { group: "*", kind: "*" }
  namespaceResourceWhitelist:
    - { group: "*", kind: "*" }
  orphanedResources: { warn: true }
